<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼신노트 퍼고베리스 카드뉴스 — 편집형</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --cream:#FFF9D2; --peach:#FFEBCC; --sky1:#BFDDF0; --sky2:#8CC0EB;
    --ink:#2A3340; --ink2:#46505E; --mut:#7C8794; --acc:#3E6B8C; /* 진한 스카이(소형 텍스트 가독용) */
    --sans:'Pretendard','Noto Sans CJK KR',sans-serif;
    --mono:'IBM Plex Mono','Noto Sans Mono CJK KR',monospace;
    --serif:'Nanum Myeongjo','Noto Serif CJK KR',serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;word-break:keep-all}
  body{background:#E7EBF0;font-family:var(--sans);color:var(--ink);padding:28px 0 80px;display:flex;flex-direction:column;align-items:center;gap:12px;overflow-x:auto}
  body.exporting .guides{display:none!important}

  .hdr{width:1080px;background:#fff;border:1px solid #D9E1E8;border-radius:14px;padding:20px 24px;margin-bottom:12px}
  .hdr h1{font-size:20px;font-weight:800;margin-bottom:8px}
  .hdr h1 b{color:var(--acc)}
  .hdr p{font-size:13.5px;color:#5C6672;line-height:1.65}
  .hdr p b{color:#2C3340}
  .hdr .row{margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .hdr label.chk{font-size:13px;color:#5C6672;display:flex;align-items:center;gap:7px;cursor:pointer}
  .btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);font-size:14px;font-weight:700;
    background:var(--sky2);color:#17344A;border:none;border-radius:10px;padding:11px 18px;cursor:pointer}
  .btn.mg{background:var(--acc);color:#fff}
  .btn.ghost{background:transparent;color:#5C6672;border:1px solid #C7D2DC}
  .btn.sm{font-size:12.5px;padding:8px 13px;border-radius:9px}

  .frame{display:flex;flex-direction:column;align-items:center;gap:10px}
  .tools{width:1080px;display:flex;gap:9px;flex-wrap:wrap;justify-content:center;align-items:center;margin-bottom:16px}
  .tools .ctl{display:flex;align-items:center;gap:7px;font-size:12px;color:#5C6672;background:#fff;border:1px solid #D7DEE5;border-radius:9px;padding:6px 11px}
  .tools .ctl input[type=range]{width:120px;accent-color:var(--acc)}

  .slide{width:1080px;height:1350px;position:relative;overflow:hidden}
  .bg{position:absolute;inset:0;z-index:0;background:linear-gradient(158deg,#FFF9D2 0%, #FFEFD6 46%, #FFEBCC 100%)}
  .bg .photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 50%;display:none}
  .slide.has-img .photo{display:block}
  .overlay{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(78% 52% at 86% 7%, rgba(140,192,235,.30), transparent 55%),
               radial-gradient(70% 50% at 4% 100%, rgba(191,221,240,.34), transparent 60%)}
  .slide.has-img .overlay{background:linear-gradient(180deg, rgba(255,249,210,.66) 0%, rgba(255,235,204,.85) 100%)}
  .content{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;padding:92px 84px}

  .guides{position:absolute;inset:0;z-index:6;pointer-events:none}
  .guides .safe{position:absolute;inset:62px;border:1.5px dashed rgba(42,51,64,.35);border-radius:6px}
  .guides .safe::after{content:'안전 영역';position:absolute;top:-28px;left:0;font-family:var(--mono);font-size:15px;color:rgba(42,51,64,.5);letter-spacing:.1em}
  .cm{position:absolute;width:34px;height:34px;border:3px solid var(--acc)}
  .cm.tl{top:20px;left:20px;border-right:none;border-bottom:none}
  .cm.tr{top:20px;right:20px;border-left:none;border-bottom:none}
  .cm.bl{bottom:20px;left:20px;border-right:none;border-top:none}
  .cm.br{bottom:20px;right:20px;border-left:none;border-top:none}

  .top{display:grid;grid-template-columns:1fr auto;align-items:center;flex:none}
  .top .brand{font-size:26px;font-weight:800;letter-spacing:-.01em;color:var(--ink)}
  .top .brand b{color:var(--acc)}
  .top .handle{text-align:right;font-family:var(--mono);font-size:21px;color:var(--mut)}

  .mid{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;outline:none;caret-color:var(--acc)}
  .dots{flex:none;display:flex;gap:13px;justify-content:center}
  .dots i{width:14px;height:14px;border-radius:50%;background:rgba(42,51,64,.2)}
  .dots i.on{background:var(--acc)}

  h2{font-size:78px;font-weight:900;line-height:1.12;letter-spacing:-.025em;color:var(--ink)}
  .qhead{font-size:60px;font-weight:900;line-height:1.16;letter-spacing:-.02em}
  .o{background:linear-gradient(transparent 55%, rgba(140,192,235,.7) 55%);padding:0 .04em;border-radius:2px}
  .bd{font-size:36px;line-height:1.6;color:var(--ink2);margin-top:28px}
  .bd b{color:var(--ink);font-weight:800}

  /* cover */
  .eyebrow{display:inline-block;background:var(--sky1);color:#234155;font-size:24px;font-weight:700;border-radius:30px;padding:11px 24px;margin-bottom:28px;align-self:flex-start}
  .cover h2{font-size:104px;font-weight:900;letter-spacing:-.035em;line-height:.98}
  .qsub{font-size:42px;font-weight:800;color:var(--ink);line-height:1.3;margin-top:30px}

  .ratio{display:inline-flex;align-items:center;gap:10px;background:var(--sky2);color:#163049;font-weight:900;font-size:42px;border-radius:18px;padding:18px 32px;margin-top:32px;align-self:flex-start}

  .vsrow{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:32px}
  .vscol{background:rgba(255,255,255,.62);border:1.5px solid rgba(42,51,64,.12);border-radius:20px;padding:32px 28px}
  .vscol.act{background:var(--sky1);border-color:var(--sky2)}
  .vscol .tag{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--acc);margin-bottom:14px}
  .vscol p{font-size:28px;line-height:1.45;color:var(--ink)}

  .checks{display:flex;flex-direction:column;gap:18px;margin-top:34px}
  .ck{font-size:33px;font-weight:600;color:var(--ink);padding-left:50px;position:relative;line-height:1.35}
  .ck::before{content:'✔';position:absolute;left:0;top:0;color:var(--acc);font-weight:900;font-size:32px}

  .eq{margin-top:30px;background:var(--peach);border:1.5px solid rgba(42,51,64,.1);border-radius:16px;padding:28px 32px;font-size:34px;font-weight:800;color:var(--ink);line-height:1.5}

  .disc{margin-top:34px;border-left:3px solid var(--sky2);padding-left:22px;font-size:22px;color:var(--mut);line-height:1.5}
  .brandline{margin-top:22px;font-size:26px;font-weight:700;color:var(--acc)}
</style>
</head>
<body>

<div class="hdr" data-html2canvas-ignore="true">
  <h1>삼신<b>노트</b> · 퍼고베리스 카드뉴스 — 편집형</h1>
  <p>권장 이미지 <b>1080 × 1350px (4:5)</b>. &nbsp;① <b>이미지 넣기</b> 후 <b>줌·가로·세로</b>로 크롭, <b>채움/전체</b> 전환. 이미지를 넣으면 자동으로 밝은 워시가 깔려 글이 보입니다. &nbsp;② <b>텍스트 클릭</b>해 수정. &nbsp;③ 점선 <b>안전영역·절취선</b>은 저장 이미지엔 안 나옵니다. &nbsp;④ <b>PNG 저장</b> = 1080×1350.</p>
  <div class="row">
    <button class="btn mg" id="saveAll">모든 슬라이드 PNG 저장</button>
    <label class="chk"><input type="checkbox" id="toggleGuides" checked> 절취선·안전영역 표시</label>
  </div>
</div>

<div id="slides"></div>

<script>
  const DATA=[
   {name:'삼신노트_퍼고베리스_01',cover:true,dot:0,html:`
      <div class="eyebrow">배란유도주사계의 에르메스</div>
      <h2>퍼고베리스</h2>
      <div class="qsub">왜 난임의사들은<br><span class="o">비싼 퍼고베리스</span>를 선택할까?</div>`},
   {name:'삼신노트_퍼고베리스_02',dot:1,html:`
      <h2 class="qhead">퍼고베리스가<br><span class="o">특별한 이유</span></h2>
      <div class="bd">대부분의 배란유도주사는 FSH만 공급하거나 FSH 위주로 구성됩니다.<br><br>하지만 퍼고베리스는 <b>FSH 150IU + LH 75IU</b>를 한 번에 투여합니다.</div>
      <div class="ratio">FSH : LH = 2 : 1</div>`},
   {name:'삼신노트_퍼고베리스_03',dot:2,html:`
      <h2 class="qhead">FSH와 LH는<br>무슨 역할을 할까?</h2>
      <div class="vsrow">
        <div class="vscol"><div class="tag">FSH</div><p>난포를 키우는 호르몬</p></div>
        <div class="vscol act"><div class="tag">LH</div><p>난포가 성숙하고 에스트로겐 생성에 관여하는 호르몬</p></div>
      </div>
      <div class="bd">건강한 난포 성장에는 사실 <b>두 호르몬 모두</b> 필요합니다.</div>`},
   {name:'삼신노트_퍼고베리스_04',dot:3,html:`
      <h2 class="qhead">그런데 LH는<br>왜 <span class="o">중요할까?</span></h2>
      <div class="bd">난소는 FSH만으로 움직이지 않습니다.<br><br>실제 난포 내부에서는 FSH와 LH가 함께 작용하여 <b>난자의 성숙 환경</b>을 만듭니다.</div>`},
   {name:'삼신노트_퍼고베리스_05',dot:4,html:`
      <h2 class="qhead">퍼고베리스의 <span class="o">핵심</span></h2>
      <div class="bd">퍼고베리스는 FSH와 LH를 <b>2 : 1 비율로 고정 배합</b>한 유일한 주사제입니다.<br><br>매번 별도 약제를 섞거나 용량을 계산할 필요 없이 <b>한 펜으로</b> 투여 가능합니다.</div>`},
   {name:'삼신노트_퍼고베리스_06',dot:5,html:`
      <h2 class="qhead">이런 분들에게<br>고려될 수 있습니다</h2>
      <div class="checks">
        <div class="ck">35세 이상</div>
        <div class="ck">난소반응저하 (POR)</div>
        <div class="ck">저반응 환자</div>
        <div class="ck">이전 시험관 시술 반응이 아쉬웠던 경우</div>
        <div class="ck">LH 보충이 필요하다고 판단되는 경우</div>
      </div>`},
   {name:'삼신노트_퍼고베리스_07',dot:6,html:`
      <h2 class="qhead">그래서 <span class="o">비싼 이유</span></h2>
      <div class="vsrow">
        <div class="vscol"><div class="tag">곤알에프</div><p>FSH 단일제</p></div>
        <div class="vscol act"><div class="tag">퍼고베리스</div><p>FSH + LH 복합제</p></div>
      </div>
      <div class="bd">게다가 두 호르몬 모두 <b>유전자재조합</b> 방식으로 생산됩니다.</div>
      <div class="eq">복잡한 제조 공정 + 복합 호르몬 제제 <span class="o">= 높은 약가</span></div>`},
   {name:'삼신노트_퍼고베리스_08',dot:7,html:`
      <h2 class="qhead">약사가 알려주는<br>한 줄 정리</h2>
      <div class="bd">퍼고베리스는 "더 강한 주사"가 아닙니다.<br><br>FSH와 LH를 <b>2 : 1 비율</b>로 함께 공급하는 <span class="o">맞춤형 배란유도제</span>입니다.</div>
      <div class="disc">전문의약품 · 처방·투여는 반드시 전문의와 상담하세요.</div>
      <div class="brandline">삼신노트 · 근거로 곁을 지킵니다</div>`},
  ];

  const dots=(on)=>Array.from({length:8},(_,i)=>`<i class="${i===on?'on':''}"></i>`).join('');
  const slidesEl=document.getElementById('slides');
  DATA.forEach(d=>{
    const frame=document.createElement('div'); frame.className='frame';
    const id='s'+(d.dot+1);
    frame.innerHTML=`
      <div class="slide ${d.cover?'cover':''}" id="${id}" data-name="${d.name}">
        <div class="bg"><img class="photo" alt=""></div>
        <div class="overlay"></div>
        <div class="guides"><div class="safe"></div><span class="cm tl"></span><span class="cm tr"></span><span class="cm bl"></span><span class="cm br"></span></div>
        <div class="content">
          <div class="top"><span class="brand">삼신<b>노트</b></span><span class="handle">${d.cover?'@samsin.note':(d.dot+1)+' / 08'}</span></div>
          <div class="mid" contenteditable="true">${d.html}</div>
          <div class="dots">${dots(d.dot)}</div>
        </div>
      </div>
      <div class="tools" data-target="${id}">
        <label class="btn sm">이미지 넣기<input type="file" class="up" accept="image/*" hidden></label>
        <span class="ctl">줌 <input type="range" class="zoom" min="0.6" max="3" step="0.01" value="1"></span>
        <span class="ctl">가로 <input type="range" class="px" min="0" max="100" step="1" value="50"></span>
        <span class="ctl">세로 <input type="range" class="py" min="0" max="100" step="1" value="50"></span>
        <button class="btn ghost sm fit">채움 ↔ 전체</button>
        <button class="btn ghost sm reset">초기화</button>
        <button class="btn ghost sm clear">제거</button>
        <button class="btn sm save">PNG 저장</button>
      </div>`;
    slidesEl.appendChild(frame);
  });

  function apply(slide){
    const img=slide.querySelector('.photo'); const s=slide._st; if(!s) return;
    img.style.objectFit=s.fit; img.style.objectPosition=`${s.px}% ${s.py}%`; img.style.transform=`scale(${s.zoom})`;
  }
  document.querySelectorAll('.tools').forEach(t=>{
    const slide=document.getElementById(t.dataset.target);
    const img=slide.querySelector('.photo');
    const z=t.querySelector('.zoom'), px=t.querySelector('.px'), py=t.querySelector('.py');
    t.querySelector('.up').addEventListener('change',e=>{
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=()=>{ img.src=r.result; slide.classList.add('has-img'); slide._st={fit:'cover',zoom:1,px:50,py:50}; z.value=1;px.value=50;py.value=50; apply(slide); };
      r.readAsDataURL(f);
    });
    z.addEventListener('input',()=>{ if(!slide._st)return; slide._st.zoom=parseFloat(z.value); apply(slide); });
    px.addEventListener('input',()=>{ if(!slide._st)return; slide._st.px=parseFloat(px.value); apply(slide); });
    py.addEventListener('input',()=>{ if(!slide._st)return; slide._st.py=parseFloat(py.value); apply(slide); });
    t.querySelector('.fit').addEventListener('click',()=>{ if(!slide._st)return; slide._st.fit=slide._st.fit==='cover'?'contain':'cover'; apply(slide); });
    t.querySelector('.reset').addEventListener('click',()=>{ if(!slide._st)return; slide._st={fit:'cover',zoom:1,px:50,py:50}; z.value=1;px.value=50;py.value=50; apply(slide); });
    t.querySelector('.clear').addEventListener('click',()=>{ img.src=''; slide.classList.remove('has-img'); slide._st=null; z.value=1;px.value=50;py.value=50; });
    t.querySelector('.save').addEventListener('click',()=>savePng(slide));
  });

  function savePng(slide){
    if(typeof html2canvas==='undefined'){ alert('저장 모듈을 불러오지 못했습니다(인터넷 확인). 화면 캡처로 저장해 주세요.'); return Promise.resolve(); }
    document.body.classList.add('exporting');
    return html2canvas(slide,{scale:2,backgroundColor:'#FFF6CE',useCORS:true,logging:false}).then(c=>{
      document.body.classList.remove('exporting');
      const a=document.createElement('a'); a.download=(slide.dataset.name||'slide')+'.png'; a.href=c.toDataURL('image/png'); a.click();
    }).catch(()=>document.body.classList.remove('exporting'));
  }
  document.getElementById('saveAll').addEventListener('click',async()=>{
    for(const s of document.querySelectorAll('.slide')){ await savePng(s); await new Promise(r=>setTimeout(r,450)); }
  });
  document.getElementById('toggleGuides').addEventListener('change',e=>{
    document.querySelectorAll('.guides').forEach(g=>g.style.display=e.target.checked?'block':'none');
  });
</script>
</body>
</html>
