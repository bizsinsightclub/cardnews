<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼신노트 카드뉴스 — 글래스 웹 에디터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --cream:#FFF9D2; --peach:#FFEBCC; --sky1:#BFDDF0; --sky2:#8CC0EB;
    --ink:#2A3340; --ink2:#46505E; --mut:#7C8794; --acc:#3E6B8C;
    --sans:'Pretendard','Noto Sans CJK KR',sans-serif;
    --mono:'IBM Plex Mono','Noto Sans Mono CJK KR',monospace;
    --serif:'Nanum Myeongjo','Noto Serif CJK KR',serif;
    --view:0.6;
    --glass:rgba(255,255,255,.58);
    --glass-brd:rgba(255,255,255,.72);
    --glass-sh:0 8px 32px rgba(31,52,74,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;word-break:keep-all}
  html,body{min-height:100%}
  body{
    font-family:var(--sans);color:var(--ink);padding:0 0 60px;
    background:
      radial-gradient(60% 50% at 12% 0%, rgba(140,192,235,.42), transparent 60%),
      radial-gradient(55% 45% at 100% 8%, rgba(255,235,204,.68), transparent 60%),
      radial-gradient(70% 60% at 50% 100%, rgba(191,221,240,.48), transparent 60%),
      linear-gradient(160deg,#EAF1F7 0%, #F3F0E4 100%);
    background-attachment:fixed;
  }
  body.exporting .guides,body.exporting .block-bar,body.exporting .rz,body.exporting .blk.sel:after{display:none!important}
  body.exporting .slide{transform:none!important}
  body.exporting .stagewrap{width:1080px!important;height:1350px!important}

  .glass{background:var(--glass);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
    border:1px solid var(--glass-brd);box-shadow:var(--glass-sh)}

  /* ───────── 상단 바 ───────── */
  .topbar{position:sticky;top:0;z-index:55;width:100%;display:flex;justify-content:center;padding:12px 0;
    background:rgba(255,255,255,.45);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);
    border-bottom:1px solid rgba(255,255,255,.6)}
  .topbar .inner{width:min(1180px,94vw);display:flex;align-items:center;gap:14px}
  .brand-logo{font-size:18px;font-weight:800;letter-spacing:-.01em;color:var(--ink)}
  .brand-logo b{color:var(--acc)}
  .brand-logo small{display:block;font-size:10.5px;font-weight:600;color:var(--mut);letter-spacing:.06em}
  .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);font-size:13.5px;font-weight:700;
    background:rgba(255,255,255,.72);color:#274055;border:1px solid rgba(255,255,255,.82);border-radius:11px;padding:9px 14px;cursor:pointer;
    transition:transform .12s ease,box-shadow .12s ease,background .15s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(31,52,74,.16)}
  .btn.mg{background:linear-gradient(135deg,var(--sky2),var(--acc));color:#fff;border-color:transparent}
  .btn.sm{font-size:12px;padding:7px 11px;border-radius:9px}
  .help-toggle{font-size:12px;color:#41505d;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.7);border-radius:9px;padding:7px 11px;cursor:pointer}

  .hint{width:min(1180px,94vw);margin:14px auto 0;font-size:13px;line-height:1.7;color:#41505d;padding:13px 18px;border-radius:14px;display:none}
  .hint.show{display:block}
  .hint b{color:var(--acc)} .hint kbd{font-family:var(--mono);background:rgba(62,107,140,.12);border-radius:5px;padding:1px 6px;font-size:11.5px}
  .hint ul{margin:4px 0 0;padding-left:2px;list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:2px 22px}
  .hint li{padding-left:16px;position:relative}
  .hint li:before{content:'·';position:absolute;left:4px;color:var(--acc);font-weight:800}

  /* ───────── 좌측 도구 독 (포토샵식) ───────── */
  .dock{position:fixed;left:18px;top:50%;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;gap:5px;padding:9px;border-radius:18px}
  .dock .grp{display:flex;flex-direction:column;gap:5px}
  .dock hr{border:none;height:1px;background:rgba(42,51,64,.14);margin:5px 3px}
  .dock button{width:48px;height:48px;border:1px solid transparent;border-radius:13px;background:rgba(255,255,255,.5);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:18px;color:#33424f;transition:.12s;position:relative}
  .dock button small{font-size:8.5px;font-weight:700;letter-spacing:-.02em;color:#5a6773}
  .dock button:hover{background:rgba(140,192,235,.32);transform:translateY(-1px)}
  .dock button.on{background:linear-gradient(135deg,var(--sky2),var(--acc));color:#fff;border-color:transparent}
  .dock button.on small{color:#eaf3fb}
  /* 툴팁 */
  .dock button:hover:after{content:attr(data-tip);position:absolute;left:56px;top:50%;transform:translateY(-50%);white-space:nowrap;
    background:rgba(40,55,72,.95);color:#eef3f8;font-size:12px;font-weight:600;padding:6px 10px;border-radius:8px;z-index:5;box-shadow:0 6px 16px rgba(0,0,0,.25)}

  /* ───────── 워크스페이스(한 장) ───────── */
  .workspace{display:flex;flex-direction:column;align-items:center;gap:14px;padding:22px 16px 0;margin-left:46px}
  .pager{display:flex;align-items:center;gap:14px}
  .pager button{all:unset;cursor:pointer;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#33424f;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.7)}
  .pager button:hover{background:rgba(140,192,235,.3)}
  .pager .pos{font-family:var(--mono);font-size:15px;color:var(--ink);min-width:64px;text-align:center}
  .pager .sname{font-size:12.5px;color:var(--mut);font-family:var(--mono);outline:none;border-bottom:1px dashed transparent;padding:2px 4px}
  .pager .sname:focus{border-bottom-color:var(--sky2)}

  .stagewrap{position:relative;width:calc(1080px * var(--view));height:calc(1350px * var(--view));overflow:visible}
  .slide{width:1080px;height:1350px;position:absolute;top:0;left:0;transform:scale(var(--view));transform-origin:top left;overflow:visible}
  .bg{position:absolute;inset:0;z-index:0;border-radius:26px;overflow:hidden;box-shadow:0 18px 50px rgba(31,52,74,.22);
    background:linear-gradient(158deg,#FFF9D2 0%, #FFEFD6 46%, #FFEBCC 100%)}
  .bg .photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 50%;display:none}
  .slide.has-img .photo{display:block}
  .overlay{position:absolute;inset:0;z-index:1;pointer-events:none;border-radius:26px;
    background:radial-gradient(78% 52% at 86% 7%, rgba(140,192,235,.30), transparent 55%),
               radial-gradient(70% 50% at 4% 100%, rgba(191,221,240,.34), transparent 60%)}
  .slide.has-img .overlay{background:linear-gradient(180deg, rgba(255,249,210,.5) 0%, rgba(255,235,204,.78) 100%)}

  .guides{position:absolute;inset:0;z-index:6;pointer-events:none}
  .guides .safe{position:absolute;inset:62px;border:1.5px dashed rgba(42,51,64,.35);border-radius:6px}
  .guides .safe::after{content:'안전 영역';position:absolute;top:-30px;left:0;font-family:var(--mono);font-size:15px;color:rgba(42,51,64,.5);letter-spacing:.1em}
  .cm{position:absolute;width:34px;height:34px;border:3px solid var(--acc)}
  .cm.tl{top:20px;left:20px;border-right:none;border-bottom:none}
  .cm.tr{top:20px;right:20px;border-left:none;border-bottom:none}
  .cm.bl{bottom:20px;left:20px;border-right:none;border-top:none}
  .cm.br{bottom:20px;right:20px;border-left:none;border-top:none}
  .snapline{position:absolute;z-index:7;background:rgba(62,107,140,.9);pointer-events:none;display:none}
  .snapline.v{width:2px;top:0;bottom:0}
  .snapline.h{height:2px;left:0;right:0}

  /* 필름스트립 */
  .filmstrip{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:min(1180px,94vw);padding:6px 12px;border-radius:14px}
  .filmstrip .chip{min-width:38px;height:38px;padding:0 10px;border-radius:10px;border:1px solid rgba(255,255,255,.7);background:rgba(255,255,255,.55);
    cursor:pointer;font-size:13px;font-weight:700;color:#41505d;display:flex;align-items:center;justify-content:center;gap:5px}
  .filmstrip .chip.on{background:linear-gradient(135deg,var(--sky2),var(--acc));color:#fff;border-color:transparent}
  .filmstrip .chip:hover{transform:translateY(-1px)}

  /* ── 편집 블록 ── */
  .blk{position:absolute;z-index:4}
  .blk:not(.editing){cursor:move}
  .blk.editing{cursor:text;z-index:8}
  .blk .ed{outline:none;caret-color:var(--acc);user-select:none}
  .blk.editing .ed{user-select:text}
  .blk.sel{z-index:8}
  .blk.sel:after{content:'';position:absolute;inset:-10px;border:2px solid var(--sky2);border-radius:12px;pointer-events:none;z-index:5;box-shadow:0 0 0 4px rgba(140,192,235,.16)}
  /* 블록 편집 바: 슬라이드 밖의 고정 오버레이(축소 영향 없음) */
  .block-bar{position:fixed;z-index:250;display:none;align-items:center;gap:5px;
    background:rgba(40,55,72,.96);backdrop-filter:blur(10px);border-radius:14px;padding:9px;box-shadow:0 12px 30px rgba(0,0,0,.32)}
  .block-bar button{all:unset;cursor:pointer;color:#eaf1f7;font-size:17px;font-weight:700;padding:11px 14px;border-radius:10px;line-height:1;display:flex;align-items:center;gap:5px}
  .block-bar button small{font-size:13px;font-weight:600;opacity:.85}
  .block-bar button:hover{background:rgba(255,255,255,.18)}
  .block-bar .mv{cursor:grab}
  .block-bar .sepv{width:1px;height:26px;background:rgba(255,255,255,.24);margin:0 4px}
  .rz{position:absolute;right:-10px;top:50%;transform:translateY(-50%) scale(calc(1 / var(--view)));transform-origin:center;
    width:16px;height:46px;border-radius:8px;background:var(--sky2);border:2px solid #fff;cursor:ew-resize;display:none;z-index:12;box-shadow:0 2px 6px rgba(0,0,0,.22)}
  .blk.sel .rz{display:block}

  /* ── 슬라이드 컴포넌트 스타일(원본 유지) ── */
  .brandblk{font-size:26px;font-weight:800;letter-spacing:-.01em;color:var(--ink)} .brandblk b{color:var(--acc)}
  .handleblk{font-family:var(--mono);font-size:21px;color:var(--mut)}
  .dotsblk{display:flex;gap:13px} .dotsblk i{width:14px;height:14px;border-radius:50%;background:rgba(42,51,64,.2)} .dotsblk i.on{background:var(--acc)}
  .h2{font-size:78px;font-weight:900;line-height:1.12;letter-spacing:-.025em;color:var(--ink)}
  .qhead{font-size:60px;font-weight:900;line-height:1.16;letter-spacing:-.02em;color:var(--ink)}
  .hcover{font-size:104px;font-weight:900;letter-spacing:-.035em;line-height:.98;color:var(--ink)}
  .o{background:linear-gradient(transparent 55%, rgba(140,192,235,.7) 55%);padding:0 .04em;border-radius:2px}
  .bd{font-size:36px;line-height:1.6;color:var(--ink2)} .bd b{color:var(--ink);font-weight:800}
  .eyebrow{display:inline-block;background:var(--sky1);color:#234155;font-size:24px;font-weight:700;border-radius:30px;padding:11px 24px}
  .qsub{font-size:42px;font-weight:800;color:var(--ink);line-height:1.3}
  .ratio{display:inline-flex;align-items:center;gap:10px;background:var(--sky2);color:#163049;font-weight:900;font-size:42px;border-radius:18px;padding:18px 32px}
  .vsrow{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .vscol{background:rgba(255,255,255,.62);border:1.5px solid rgba(42,51,64,.12);border-radius:20px;padding:32px 28px}
  .vscol.act{background:var(--sky1);border-color:var(--sky2)}
  .vscol .tag{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--acc);margin-bottom:14px}
  .vscol p{font-size:28px;line-height:1.45;color:var(--ink)}
  .checks{display:flex;flex-direction:column;gap:18px}
  .ck{font-size:33px;font-weight:600;color:var(--ink);padding-left:50px;position:relative;line-height:1.35}
  .ck::before{content:'✔';position:absolute;left:0;top:0;color:var(--acc);font-weight:900;font-size:32px}
  .eq{background:var(--peach);border:1.5px solid rgba(42,51,64,.1);border-radius:16px;padding:28px 32px;font-size:34px;font-weight:800;color:var(--ink);line-height:1.5}
  .disc{border-left:3px solid var(--sky2);padding-left:22px;font-size:22px;color:var(--mut);line-height:1.5}
  .brandline{font-size:26px;font-weight:700;color:var(--acc)}

  /* ───────── 플로팅 선택 서식 툴바 ───────── */
  .fmt{position:fixed;z-index:200;display:none;align-items:center;gap:3px;padding:8px;border-radius:14px;
    background:rgba(40,55,72,.96);backdrop-filter:blur(10px);box-shadow:0 12px 32px rgba(0,0,0,.34)}
  .fmt:before{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:rgba(40,55,72,.96);border-bottom:none}
  .fmt button{all:unset;cursor:pointer;color:#eef3f8;min-width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;padding:0 9px}
  .fmt button:hover{background:rgba(255,255,255,.16)}
  .fmt button.act{background:var(--sky2);color:#16344a}
  .fmt .u{text-decoration:underline}
  .fmt .sep{width:1px;height:24px;background:rgba(255,255,255,.24);margin:0 4px}
  .fmt .szlabel{font-size:13px;font-weight:700;min-width:40px;justify-content:center;color:#cfe0ee}

  /* ───────── 컬러 팔레트 ───────── */
  .palette{position:fixed;z-index:300;display:none;width:256px;padding:14px;border-radius:16px;
    background:rgba(255,255,255,.94);backdrop-filter:blur(16px);box-shadow:0 16px 44px rgba(31,52,74,.3);border:1px solid rgba(255,255,255,.8)}
  .palette h5{font-size:12.5px;color:var(--mut);font-weight:700;margin-bottom:9px}
  .swatches{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-bottom:12px}
  .swatches b{display:block;width:100%;aspect-ratio:1;border-radius:5px;cursor:pointer;border:1px solid rgba(0,0,0,.12);transition:transform .1s}
  .swatches b:hover{transform:scale(1.18);box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .palette .pick{display:flex;align-items:center;gap:8px}
  .palette .pick input[type=color]{width:40px;height:36px;border:none;background:none;border-radius:8px;cursor:pointer;padding:0}
  .palette .pick input[type=text]{flex:1;font-family:var(--mono);font-size:13px;border:1px solid #cfd9e2;border-radius:8px;padding:9px 10px;text-transform:uppercase;outline:none}
  .palette .none{font-size:12px;color:var(--acc);cursor:pointer;text-align:center;margin-top:10px;text-decoration:underline}

  /* 도형 추가 메뉴 */
  .addmenu{position:fixed;z-index:300;display:none;width:236px;padding:8px;border-radius:14px;
    background:rgba(255,255,255,.96);backdrop-filter:blur(16px);box-shadow:0 16px 44px rgba(31,52,74,.3);border:1px solid rgba(255,255,255,.8);max-height:70vh;overflow:auto}
  .addmenu button{all:unset;display:flex;width:100%;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600;color:#33424f}
  .addmenu button:hover{background:rgba(140,192,235,.22)}
  .addmenu button .ico{width:26px;text-align:center;font-size:16px}

  /* 이미지 패널 */
  .imgpanel{position:fixed;z-index:300;display:none;width:268px;padding:16px;border-radius:16px;
    background:rgba(255,255,255,.95);backdrop-filter:blur(16px);box-shadow:0 16px 44px rgba(31,52,74,.3);border:1px solid rgba(255,255,255,.8)}
  .imgpanel h5{font-size:13px;color:var(--ink);font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:7px}
  .imgpanel .row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .imgpanel .row label{font-size:11.5px;color:var(--mut);font-weight:600;display:flex;justify-content:space-between}
  .imgpanel input[type=range]{width:100%;accent-color:var(--acc)}
  .imgpanel .btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .imgpanel .file{grid-column:1/3}
  .imgpanel .file .btn{width:100%;justify-content:center}
  .imgpanel .muted{font-size:11.5px;color:var(--mut);text-align:center;padding:8px 0}
</style>
</head>
<body>

<div class="topbar">
  <div class="inner">
    <div class="brand-logo">삼신<b>노트</b> 카드뉴스<small>GLASS WEB EDITOR</small></div>
    <div class="spacer"></div>
    <button class="help-toggle" id="helpToggle">사용법 ▾</button>
    <button class="btn sm mg" id="saveAll">전체 PNG 저장</button>
  </div>
</div>

<div class="hint glass" id="hint">
  <b>편집 방법</b>
  <ul>
    <li>블록을 <b>한 번 클릭</b> → 선택 (이동·크기 조절)</li>
    <li>블록을 <b>더블클릭</b> → 글자 수정</li>
    <li>선택 후 <b>드래그</b>하거나 <kbd>✥</kbd> 손잡이로 자유 이동</li>
    <li>수정 중 글자를 <b>드래그 선택</b> → 위에 서식 툴바</li>
    <li>왼쪽 도구막대: <kbd>T</kbd>텍스트 · <kbd>◇</kbd>도형 · <kbd>🖼</kbd>이미지 · <kbd>🎨</kbd>배경</li>
    <li>브랜드·페이지번호·점도 블록이라 <b>이동·삭제</b> 가능</li>
  </ul>
</div>

<!-- 좌측 도구 독 -->
<div class="dock glass" id="dock">
  <div class="grp">
    <button data-tool="text" data-tip="텍스트 추가">T<small>텍스트</small></button>
    <button data-tool="shape" data-tip="도형 추가">◇<small>도형</small></button>
    <button data-tool="image" data-tip="이미지 편집">🖼<small>이미지</small></button>
    <button data-tool="bg" data-tip="슬라이드 배경색">🎨<small>배경</small></button>
    <button data-tool="guides" data-tip="가이드 표시/숨김" class="on">〰<small>가이드</small></button>
  </div>
  <hr>
  <div class="grp">
    <button data-tool="addslide" data-tip="슬라이드 추가">＋<small>장추가</small></button>
    <button data-tool="dupslide" data-tip="슬라이드 복제">⧉<small>장복제</small></button>
    <button data-tool="delslide" data-tip="슬라이드 삭제">🗑<small>장삭제</small></button>
  </div>
  <hr>
  <div class="grp">
    <button data-tool="png" data-tip="이 슬라이드 PNG">📥<small>PNG</small></button>
    <button data-tool="reset" data-tip="전체 초기화">↺<small>초기화</small></button>
  </div>
</div>

<div class="workspace">
  <div class="pager">
    <button id="prev" title="이전">‹</button>
    <span class="pos" id="pos">1 / 8</span>
    <button id="next" title="다음">›</button>
    <span class="sname" id="sname" contenteditable="true" title="파일명(저장 시 사용)"></span>
  </div>
  <div class="stagewrap" id="stagewrap"></div>
  <div class="filmstrip glass" id="filmstrip"></div>
</div>

<!-- 플로팅 선택 서식 툴바 -->
<div class="fmt" id="fmt">
  <button data-cmd="bold" title="굵게">B</button>
  <button data-cmd="italic" title="기울임" style="font-style:italic">I</button>
  <button class="u" data-cmd="underline" title="밑줄">U</button>
  <span class="sep"></span>
  <button data-cmd="hl-theme" title="테마 하이라이트">🖍︎</button>

const SWATCHES=[
 '#FFFFFF','#F2F2F2','#D9D9D9','#BFBFBF','#808080','#595959','#404040','#262626','#000000','#FFF9D2',
 '#FFEBCC','#FFE0B3','#FFD1A6','#FFB38A','#FF8C66','#F2603C','#D9412A','#B32D2D','#7A1F1F','#FFEFD6',
 '#BFDDF0','#8CC0EB','#5FA8DE','#3E6B8C','#2C5070','#234155','#163049','#1C3A2E','#2E7D5B','#5FBF8C',
 '#E7F4EC','#D7B3FF','#B388FF','#8C5BE0','#6A3FB5','#FFD6E7','#FF9EC4','#E85A9B','#2A3340','#46505E',
];
const TYPE_FONT={hcover:104,qhead:60,h2:78,qsub:42,bd:36,eyebrow:24,ratio:42,eq:34,disc:22,brandline:26,brand:26,handle:21,vsrow:null,checks:null,dots:null};

/* ════════════════ 1. 저장소 + 레이아웃 베이크 ════════════════ */
const KEY='samsin_cardnews_v2';
let state, cur=0;
function rid(){return Math.random().toString(36).slice(2,8)}
function dotsHTML(on,total){ return Array.from({length:total},(_,i)=>`<i class="${i===on?'on':''}"></i>`).join(''); }
function preState(){
  return {_baked:false,_guides:true,slides:DEFAULT.map((d,i)=>({
    id:'sl_'+rid(), name:d.name, cover:!!d.cover, bg:null, image:null,
    _brand:{id:'b'+rid(),type:'brand',html:'삼신<b>노트</b>',fontPx:null,bg:null},
    _handle:{id:'b'+rid(),type:'handle',html:d.handle,fontPx:null,bg:null},
    _dots:{id:'b'+rid(),type:'dots',html:dotsHTML(i,DEFAULT.length),fontPx:null,bg:null},
    _content:d.content.map(c=>({id:'b'+rid(),type:c.type,html:c.html,fontPx:null,bg:null})),
  }))};
}
function load(){ try{ const s=localStorage.getItem(KEY); if(s){ const o=JSON.parse(s); if(o&&o._baked) return o; } }catch(e){} return preState(); }
let saveT; function save(){ clearTimeout(saveT); saveT=setTimeout(()=>{ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){ console.warn('저장 실패(이미지 용량 초과 가능)',e); } },250); }

/* 최초 1회: 원본 레이아웃을 측정해 모든 블록을 절대좌표로 굳힘 */
function bakeLayout(){
  const host=document.createElement('div'); host.style.cssText='position:fixed;left:-10000px;top:0;width:1080px;visibility:hidden';
  document.body.appendChild(host);
  state.slides.forEach((sl,idx)=>{
    const slide=document.createElement('div'); slide.style.cssText='position:relative;width:1080px;height:1350px;font-family:var(--sans)';
    const top=document.createElement('div'); top.style.cssText='position:absolute;top:92px;left:84px;right:84px;display:grid;grid-template-columns:1fr auto;align-items:center';
    top.innerHTML=`<span class="brandblk">${sl._brand.html}</span><span class="handleblk" style="justify-self:end">${sl._handle.html}</span>`;
    slide.appendChild(top);
    const flow=document.createElement('div'); flow.style.cssText='position:absolute;left:84px;right:84px;top:210px;bottom:170px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:26px';
    sl._content.forEach(b=>{ const d=document.createElement('div'); d.className='ed '+b.type; if(b.type==='vsrow'||b.type==='checks'||b.type==='bd'||b.type==='disc') d.style.width='912px'; else d.style.maxWidth='912px'; d.innerHTML=b.html; flow.appendChild(d); });
    slide.appendChild(flow);
    const dots=document.createElement('div'); dots.style.cssText='position:absolute;bottom:92px;left:0;right:0;display:flex;justify-content:center';
    dots.innerHTML=`<span class="dotsblk">${sl._dots.html}</span>`;
    slide.appendChild(dots);
    host.appendChild(slide);
    const sr=slide.getBoundingClientRect(); const blocks=[];
    const put=(b,el)=>{ const r=el.getBoundingClientRect(); blocks.push(Object.assign({},b,{x:Math.round(r.left-sr.left),y:Math.round(r.top-sr.top),w:Math.round(r.width)+2})); };
    put(sl._brand, top.querySelector('.brandblk'));
    put(sl._handle, top.querySelector('.handleblk'));
    flow.querySelectorAll('.ed').forEach((el,i)=>put(sl._content[i],el));
    put(sl._dots, dots.querySelector('.dotsblk'));
    sl.blocks=blocks; delete sl._brand; delete sl._handle; delete sl._dots; delete sl._content;
  });
  document.body.removeChild(host); state._baked=true; save();
}

/* ════════════════ 2. 렌더 (현재 슬라이드 한 장) ════════════════ */
const stagewrap=document.getElementById('stagewrap');
function curSlide(){ return state.slides[cur]; }
function render(){
  const sl=curSlide();
  selBlk=null; editingEd=null; document.getElementById('blockbar').style.display='none';
  const bgStyle = sl.bg ? `background:${sl.bg}` : '';
  stagewrap.innerHTML=`
    <div class="slide ${sl.cover?'cover':''} ${sl.image?'has-img':''}" data-name="${sl.name}">
      <div class="bg" style="${bgStyle}"><img class="photo" alt=""></div>
      <div class="overlay"></div>
      <div class="guides"><div class="safe"></div><span class="cm tl"></span><span class="cm tr"></span><span class="cm bl"></span><span class="cm br"></span></div>
      <span class="snapline v"></span><span class="snapline h"></span>
    </div>`;
  const slideEl=stagewrap.querySelector('.slide');
  sl.blocks.forEach(b=> slideEl.appendChild(buildBlock(sl,b,slideEl)) );
  if(sl.image){ const img=slideEl.querySelector('.photo'); img.src=sl.image.src; applyImg(slideEl,sl.image); }
  applyGuides(); updatePager(); syncImagePanel();
}
function buildBlock(sl,b,slideEl){
  const wrap=document.createElement('div'); wrap.className='blk'; wrap.dataset.bid=b.id;
  wrap.style.left=b.x+'px'; wrap.style.top=b.y+'px'; if(b.w) wrap.style.width=b.w+'px';
  const ed=document.createElement('div'); ed.className='ed '+b.type; ed.contentEditable='false'; ed.innerHTML=b.html;
  if(b.fontPx) ed.style.fontSize=b.fontPx+'px';
  if(b.bg){ ed.style.background=b.bg; ed.querySelectorAll('.vscol').forEach(v=>v.style.background=b.bg); }
  ed.addEventListener('input',()=>{ b.html=ed.innerHTML; if(selBlk===wrap) positionBlockBar(); save(); });
  wrap.appendChild(ed);
  const rz=document.createElement('div'); rz.className='rz'; wrap.appendChild(rz);
  wireBlock(wrap,ed,rz,sl,b,slideEl);
  return wrap;
}

/* ════════════════ 3. 선택 / 편집 / 이동 / 크기 ════════════════ */
let selBlk=null, editingEd=null;
const blockbar=document.getElementById('blockbar');
function blkData(wrap){ return wrap?curSlide().blocks.find(x=>x.id===wrap.dataset.bid):null; }
function selectBlock(wrap){ if(selBlk&&selBlk!==wrap) selBlk.classList.remove('sel'); selBlk=wrap; if(wrap) wrap.classList.add('sel'); positionBlockBar(); }
function clearSel(){ if(selBlk){selBlk.classList.remove('sel'); selBlk=null;} blockbar.style.display='none'; }
function enterEdit(wrap){ exitEdit(); const ed=wrap.querySelector('.ed'); wrap.classList.add('editing'); ed.contentEditable='true'; editingEd=ed; selectBlock(wrap); ed.focus(); }
function exitEdit(){ if(!editingEd) return; const ed=editingEd; const w=ed.closest('.blk'); ed.contentEditable='false'; w&&w.classList.remove('editing'); editingEd=null; fmt.style.display='none'; }
function VIEW(){ return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--view'))||0.6; }
function positionBlockBar(){
  if(!selBlk){ blockbar.style.display='none'; return; }
  blockbar.style.display='flex'; const r=selBlk.getBoundingClientRect();
  const bw=blockbar.offsetWidth, bh=blockbar.offsetHeight;
  let left=Math.max(8,Math.min(window.innerWidth-bw-8,r.left));
  let top=r.top-bh-10; if(top<8) top=r.bottom+10;
  blockbar.style.left=left+'px'; blockbar.style.top=top+'px';
}
/* 고정 블록 바 동작 (선택된 블록 대상) */
blockbar.querySelector('.mv').addEventListener('mousedown',e=>{ e.preventDefault(); e.stopPropagation(); if(!selBlk)return; startDrag(e,selBlk,blkData(selBlk),stagewrap.querySelector('.slide')); });
blockbar.addEventListener('mousedown',e=>{ if(!e.target.closest('button')) e.preventDefault(); });
blockbar.addEventListener('click',e=>{
  const a=e.target.closest('button')?.dataset.a; if(!a||!selBlk) return;
  const b=blkData(selBlk), ed=selBlk.querySelector('.ed'), sl=curSlide();
  if(a==='fdown'||a==='fup'){ const c=b.fontPx||TYPE_FONT[b.type]||parseFloat(getComputedStyle(ed).fontSize); const nv=Math.max(10,Math.round(c+(a==='fup'?4:-4))); b.fontPx=nv; ed.style.fontSize=nv+'px'; save(); positionBlockBar(); }
  else if(a==='del'){ const i=sl.blocks.indexOf(b); if(i>=0){ sl.blocks.splice(i,1); save(); render(); } }
  else if(a==='dup'){ const i=sl.blocks.indexOf(b); const c=JSON.parse(JSON.stringify(b)); c.id='b'+rid(); c.x+=24;c.y+=24; sl.blocks.splice(i+1,0,c); save(); render(); }
  else if(a==='bg'){ openPalette({title:'블록 배경색',anchor:e.target,initial:b.bg,allowNone:true,onPick:v=>{ b.bg=v; ed.style.background=v||''; ed.querySelectorAll('.vscol').forEach(x=>x.style.background=v||''); save(); }}); }
});
window.addEventListener('scroll',positionBlockBar,true);
window.addEventListener('resize',positionBlockBar);

function wireBlock(wrap,ed,rz,sl,b,slideEl){
  wrap.addEventListener('dblclick',()=>enterEdit(wrap));
  wrap.addEventListener('mousedown',e=>{
    if(e.target.closest('.rz')) return;
    if(editingEd===ed) return;                 // 편집 중이면 캐럿 동작 허용
    if(editingEd) exitEdit();
    selectBlock(wrap);
    startDrag(e,wrap,b,slideEl);
  });
  rz.addEventListener('mousedown',e=>{ e.preventDefault(); e.stopPropagation(); const ow=wrap.offsetWidth,ox=e.clientX,v=VIEW();
    function mv(ev){ const nw=Math.max(80,Math.round(ow+(ev.clientX-ox)/v)); b.w=nw; wrap.style.width=nw+'px'; positionBlockBar(); }
    function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); save(); }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
}
/* 현재 슬라이드 다른 블록들의 캔버스 좌표 박스 (스마트 가이드용) */
function blockGeom(exceptId){
  const list=[]; curSlide().blocks.forEach(o=>{ if(o.id===exceptId) return; const el=stagewrap.querySelector('.blk[data-bid="'+o.id+'"]'); if(!el) return; list.push({left:o.x,top:o.y,w:el.offsetWidth,h:el.offsetHeight}); });
  return list;
}
function startDrag(e,wrap,b,slideEl){
  const v=VIEW(), ox=e.clientX, oy=e.clientY, sx=b.x, sy=b.y; let moved=false;
  const vline=slideEl.querySelector('.snapline.v'), hline=slideEl.querySelector('.snapline.h');
  const others=blockGeom(b.id);
  function mv(ev){
    if(!moved && Math.abs(ev.clientX-ox)+Math.abs(ev.clientY-oy)<4) return; moved=true;
    let nx=sx+(ev.clientX-ox)/v, ny=sy+(ev.clientY-oy)/v; const bw=wrap.offsetWidth, bh=wrap.offsetHeight;
    // 스냅 후보 = 캔버스 가이드 + 다른 블록 모서리/중심
    const vT=[540,62,1018], hT=[62,675,1288];
    others.forEach(o=>{ vT.push(o.left,o.left+o.w/2,o.left+o.w); hT.push(o.top,o.top+o.h/2,o.top+o.h); });
    let bestV=null; [nx,nx+bw/2,nx+bw].forEach(val=>vT.forEach(t=>{ const d=Math.abs(val-t); if(d<11&&(!bestV||d<bestV.d)) bestV={d,shift:t-val,at:t}; }));
    if(bestV){ nx+=bestV.shift; vline.style.left=bestV.at+'px'; vline.style.display='block'; } else vline.style.display='none';
    let bestH=null; [ny,ny+bh/2,ny+bh].forEach(val=>hT.forEach(t=>{ const d=Math.abs(val-t); if(d<11&&(!bestH||d<bestH.d)) bestH={d,shift:t-val,at:t}; }));
    if(bestH){ ny+=bestH.shift; hline.style.top=bestH.at+'px'; hline.style.display='block'; } else hline.style.display='none';
    b.x=Math.round(nx); b.y=Math.round(ny); wrap.style.left=b.x+'px'; wrap.style.top=b.y+'px'; positionBlockBar();
  }
  function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); vline.style.display='none'; hline.style.display='none'; if(moved) save(); }
  document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
}
document.addEventListener('mousedown',e=>{
  const t=e.target; if(!t||typeof t.closest!=='function') return;
  const inUI=t.closest('.fmt,.palette,.addmenu,.imgpanel,.dock,.block-bar,.topbar,.pager,.filmstrip');
  if(!t.closest('.blk') && !inUI){ exitEdit(); clearSel(); }
});

/* ════════════════ 4. 선택 서식 툴바 ════════════════ */
const fmt=document.getElementById('fmt'); let lastRange=null;
function inEd(node){ while(node){ if(node.nodeType===1&&node.classList&&node.classList.contains('ed'))return node; node=node.parentNode; } return null; }
function updateFmt(){
  const sel=window.getSelection();
  if(!editingEd || !sel.rangeCount || sel.isCollapsed){ fmt.style.display='none'; return; }
  const r=sel.getRangeAt(0); const ed=inEd(r.commonAncestorContainer); if(!ed){ fmt.style.display='none'; return; }
  lastRange=r.cloneRange(); const rc=r.getBoundingClientRect(); fmt.style.display='flex';
  const fw=fmt.offsetWidth, fh=fmt.offsetHeight; let left=rc.left+rc.width/2-fw/2; left=Math.max(8,Math.min(window.innerWidth-fw-8,left));
  let top=rc.top-fh-14; if(top<8) top=rc.bottom+14; fmt.style.left=left+'px'; fmt.style.top=top+'px';
  fmt.querySelector('[data-cmd=bold]').classList.toggle('act',document.queryCommandState('bold'));
  fmt.querySelector('[data-cmd=italic]').classList.toggle('act',document.queryCommandState('italic'));
  fmt.querySelector('[data-cmd=underline]').classList.toggle('act',document.queryCommandState('underline'));
}
document.addEventListener('selectionchange',()=>{ clearTimeout(fmt._t); fmt._t=setTimeout(updateFmt,10); });
window.addEventListener('scroll',()=>{ if(fmt.style.display==='flex') updateFmt(); },true);
function restore(){ if(!lastRange)return; const s=window.getSelection(); s.removeAllRanges(); s.addRange(lastRange); }
function curEd(){ return lastRange?inEd(lastRange.commonAncestorContainer):null; }
function syncEd(){ const ed=curEd(); if(ed){ const b=findBlock(ed); if(b){ b.html=ed.innerHTML; save(); } } }
function findBlock(ed){ const w=ed.closest('.blk'); if(!w)return null; const sl=curSlide(); return sl.blocks.find(b=>b.id===w.dataset.bid); }
fmt.addEventListener('mousedown',e=>e.preventDefault());
fmt.addEventListener('click',e=>{
  const cmd=e.target.closest('button')?.dataset.cmd; if(!cmd)return; restore(); document.execCommand('styleWithCSS',false,true);
  if(cmd==='bold'||cmd==='italic'||cmd==='underline') document.execCommand(cmd,false,null);
  else if(cmd==='hl-theme') document.execCommand('hiliteColor',false,'rgba(140,192,235,0.7)');
  else if(cmd==='hl-pick'){ openPalette({title:'하이라이트 색',anchor:e.target,initial:'#8CC0EB',onPick:v=>{ restore(); document.execCommand('styleWithCSS',false,true); document.execCommand('hiliteColor',false,v); syncEd(); }}); return; }
  else if(cmd==='color'){ openPalette({title:'글자색',anchor:e.target,initial:'#2A3340',onPick:v=>{ restore(); document.execCommand('styleWithCSS',false,true); document.execCommand('foreColor',false,v); syncEd(); }}); return; }
  else if(cmd==='size-up'||cmd==='size-down') stepFontSize(cmd==='size-up'?4:-4);
  else if(cmd==='clear') document.execCommand('removeFormat',false,null);
  updateFmt(); syncEd();
});
function stepFontSize(d){ const sel=window.getSelection(); if(!sel.rangeCount||sel.isCollapsed)return; const r=sel.getRangeAt(0);
  let base=18; const an=r.startContainer.nodeType===3?r.startContainer.parentElement:r.startContainer; if(an) base=parseFloat(getComputedStyle(an).fontSize)||18;
  const np=Math.max(10,Math.round(base+d)); const span=document.createElement('span'); span.style.fontSize=np+'px';
  try{ r.surroundContents(span); }catch(_){ const f=r.extractContents(); span.appendChild(f); r.insertNode(span); }
  sel.removeAllRanges(); const nr=document.createRange(); nr.selectNodeContents(span); sel.addRange(nr); lastRange=nr.cloneRange();
}

/* ════════════════ 5. 컬러 팔레트 ════════════════ */
const palette=document.getElementById('palette'),swEl=document.getElementById('swatches');
const palColor=document.getElementById('palColor'),palHex=document.getElementById('palHex'),palNone=document.getElementById('palNone'),palTitle=document.getElementById('palTitle');
SWATCHES.forEach(c=>{ const b=document.createElement('b'); b.style.background=c; b.dataset.c=c; swEl.appendChild(b); });
let palOnPick=null;
function openPalette({title,anchor,initial,onPick,allowNone}){
  palTitle.textContent=title||'색 선택'; palOnPick=onPick; palNone.style.display=allowNone?'block':'none';
  const hex=normHex(initial)||'#8CC0EB'; palColor.value=hex; palHex.value=hex.toUpperCase(); palette.style.display='block';
  const r=anchor.getBoundingClientRect(),pw=palette.offsetWidth,ph=palette.offsetHeight;
  let left=Math.min(window.innerWidth-pw-8,Math.max(8,r.right+8)); let top=Math.max(8,Math.min(window.innerHeight-ph-8,r.top));
  palette.style.left=left+'px'; palette.style.top=top+'px';
}
function closePalette(){ palette.style.display='none'; palOnPick=null; }
function normHex(v){ if(!v)return null; const m=String(v).trim().match(/^#?([0-9a-fA-F]{6})$/); return m?'#'+m[1]:null; }
swEl.addEventListener('click',e=>{ const c=e.target.dataset.c; if(!c||!palOnPick)return; palColor.value=c; palHex.value=c.toUpperCase(); palOnPick(c); });
palColor.addEventListener('input',()=>{ palHex.value=palColor.value.toUpperCase(); palOnPick&&palOnPick(palColor.value); });
palHex.addEventListener('input',()=>{ const h=normHex(palHex.value); if(h){ palColor.value=h; palOnPick&&palOnPick(h); } });
palNone.addEventListener('click',()=>{ palOnPick&&palOnPick(null); closePalette(); });
document.addEventListener('mousedown',e=>{ if(palette.style.display==='block' && !e.target.closest('.palette') && !e.target.closest('[data-cmd=hl-pick]') && !e.target.closest('[data-cmd=color]') && !e.target.closest('[data-a=bg]') && !e.target.closest('[data-tool=bg]')) closePalette(); });

/* ════════════════ 6. 도형 추가 ════════════════ */
const addmenu=document.getElementById('addmenu');
addmenu.innerHTML=SHAPES.map((s,i)=>`<button data-i="${i}"><span class="ico">${s.ico}</span>${s.label}</button>`).join('');
addmenu.addEventListener('click',e=>{ const i=e.target.closest('button')?.dataset.i; if(i==null)return; const s=SHAPES[i]; const sl=curSlide();
  sl.blocks.push({id:'b'+rid(),type:s.type,html:s.html,x:160,y:540,w:s.type==='vsrow'||s.type==='checks'||s.type==='bd'?760:0,fontPx:null,bg:null}); save(); render(); addmenu.style.display='none'; });
function addText(){ const sl=curSlide(); sl.blocks.push({id:'b'+rid(),type:'bd',html:'새 텍스트',x:200,y:560,w:0,fontPx:null,bg:null}); save(); render(); }

/* ════════════════ 7. 이미지 패널 ════════════════ */
const imgpanel=document.getElementById('imgpanel');
const iZoom=document.getElementById('iZoom'),iPx=document.getElementById('iPx'),iPy=document.getElementById('iPy');
const vZoom=document.getElementById('vZoom'),vPx=document.getElementById('vPx'),vPy=document.getElementById('vPy');
function applyImg(slideEl,im){ const img=slideEl.querySelector('.photo'); img.style.objectFit=im.fit; img.style.objectPosition=`${im.px}% ${im.py}%`; img.style.transform=`scale(${im.zoom})`; }
function syncImagePanel(){
  const sl=curSlide(); document.getElementById('imgWhich').textContent='#'+(cur+1);
  const has=!!sl.image; document.getElementById('imgEmpty').style.display=has?'none':'block'; document.getElementById('imgCtrls').style.display=has?'block':'none';
  if(has){ iZoom.value=sl.image.zoom; iPx.value=sl.image.px; iPy.value=sl.image.py; vZoom.textContent=(+sl.image.zoom).toFixed(1); vPx.textContent=sl.image.px; vPy.textContent=sl.image.py; }
}
document.getElementById('iFile').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f)return; const rd=new FileReader(); rd.onload=()=>{ curSlide().image={src:rd.result,fit:'cover',zoom:1,px:50,py:50}; save(); render(); }; rd.readAsDataURL(f); });
function liveImg(){ const sl=curSlide(); if(!sl.image)return; const slideEl=stagewrap.querySelector('.slide'); applyImg(slideEl,sl.image); save(); }
iZoom.addEventListener('input',()=>{ const sl=curSlide(); if(!sl.image)return; sl.image.zoom=parseFloat(iZoom.value); vZoom.textContent=(+sl.image.zoom).toFixed(1); liveImg(); });
iPx.addEventListener('input',()=>{ const sl=curSlide(); if(!sl.image)return; sl.image.px=parseFloat(iPx.value); vPx.textContent=iPx.value; liveImg(); });
iPy.addEventListener('input',()=>{ const sl=curSlide(); if(!sl.image)return; sl.image.py=parseFloat(iPy.value); vPy.textContent=iPy.value; liveImg(); });
document.getElementById('iFit').addEventListener('click',()=>{ const sl=curSlide(); if(!sl.image)return; sl.image.fit=sl.image.fit==='cover'?'contain':'cover'; liveImg(); });
document.getElementById('iClear').addEventListener('click',()=>{ curSlide().image=null; save(); render(); });

/* ════════════════ 8. PNG 저장 ════════════════ */
function savePng(slideEl,name){
  if(typeof html2canvas==='undefined'){ alert('저장 모듈을 불러오지 못했습니다(인터넷 확인). 화면 캡처로 저장해 주세요.'); return Promise.resolve(); }
  clearSel(); exitEdit(); closeAllPanels(); document.body.classList.add('exporting');
  return html2canvas(slideEl,{scale:2,backgroundColor:null,useCORS:true,logging:false,width:1080,height:1350,windowWidth:1080,windowHeight:1350}).then(c=>{
    document.body.classList.remove('exporting'); const a=document.createElement('a'); a.download=(name||'slide')+'.png'; a.href=c.toDataURL('image/png'); a.click();
  }).catch(err=>{ document.body.classList.remove('exporting'); console.error(err); alert('저장 중 오류가 발생했습니다.'); });
}
async function saveAll(){ const keep=cur; for(let i=0;i<state.slides.length;i++){ cur=i; render(); await new Promise(r=>setTimeout(r,60)); await savePng(stagewrap.querySelector('.slide'),state.slides[i].name); await new Promise(r=>setTimeout(r,400)); } cur=keep; render(); }

/* ════════════════ 9. 페이저 / 필름스트립 / 독 ════════════════ */
const filmstrip=document.getElementById('filmstrip'),posEl=document.getElementById('pos'),snameEl=document.getElementById('sname');
function setIndex(i){ cur=Math.max(0,Math.min(state.slides.length-1,i)); render(); }
function updatePager(){
  posEl.textContent=(cur+1)+' / '+state.slides.length; snameEl.textContent=curSlide().name;
  filmstrip.innerHTML=state.slides.map((s,i)=>`<button class="chip ${i===cur?'on':''}" data-i="${i}">${i+1}${s.cover?' ★':''}</button>`).join('');
}
filmstrip.addEventListener('click',e=>{ const i=e.target.closest('.chip')?.dataset.i; if(i!=null) setIndex(+i); });
document.getElementById('prev').addEventListener('click',()=>setIndex(cur-1));
document.getElementById('next').addEventListener('click',()=>setIndex(cur+1));
snameEl.addEventListener('input',()=>{ curSlide().name=snameEl.textContent.trim(); save(); updatePagerNameOnly(); });
function updatePagerNameOnly(){ filmstrip.querySelectorAll('.chip').forEach((c,i)=>{ /* 이름만 바뀌므로 필름스트립 갱신 불필요 */ }); }

function applyGuides(){ const on=state._guides!==false; const g=stagewrap.querySelector('.guides'); if(g) g.style.display=on?'block':'none'; document.querySelector('[data-tool=guides]').classList.toggle('on',on); }
function closeAllPanels(){ closePalette(); addmenu.style.display='none'; imgpanel.style.display='none'; }
function toggleFloat(el,anchor,w){ const open=el.style.display==='block'; closeAllPanels(); if(open)return; el.style.display='block'; const r=anchor.getBoundingClientRect(); el.style.left=(r.right+10)+'px'; el.style.top=Math.max(8,Math.min(window.innerHeight-el.offsetHeight-8,r.top))+'px'; }

document.getElementById('dock').addEventListener('click',e=>{
  const btn=e.target.closest('button'); if(!btn)return; const tool=btn.dataset.tool;
  if(tool==='text'){ addText(); }
  else if(tool==='shape'){ toggleFloat(addmenu,btn); }
  else if(tool==='image'){ toggleFloat(imgpanel,btn); syncImagePanel(); }
  else if(tool==='bg'){ const open=palette.style.display==='block'; closeAllPanels(); if(open)return; openPalette({title:'슬라이드 배경색',anchor:btn,initial:curSlide().bg,allowNone:true,onPick:v=>{ curSlide().bg=v; const bg=stagewrap.querySelector('.bg'); bg.style.background=v||''; save(); }}); }
  else if(tool==='guides'){ state._guides=!(state._guides!==false); save(); applyGuides(); }
  else if(tool==='addslide'){ addSlide(); }
  else if(tool==='dupslide'){ dupSlide(); }
  else if(tool==='delslide'){ delSlide(); }
  else if(tool==='png'){ savePng(stagewrap.querySelector('.slide'),curSlide().name); }
  else if(tool==='reset'){ if(confirm('모든 편집을 지우고 기본 8슬라이드로 되돌릴까요?')){ localStorage.removeItem(KEY); init(true); } }
});
document.addEventListener('mousedown',e=>{ if(addmenu.style.display==='block'&&!e.target.closest('#addmenu')&&!e.target.closest('[data-tool=shape]')) addmenu.style.display='none';
  if(imgpanel.style.display==='block'&&!e.target.closest('#imgpanel')&&!e.target.closest('[data-tool=image]')) imgpanel.style.display='none'; });

function newSlideObj(n){ const v=VIEW(); return {id:'sl_'+rid(),name:'삼신노트_퍼고베리스_'+String(n).padStart(2,'0'),cover:false,bg:null,image:null,blocks:[
  {id:'b'+rid(),type:'brand',html:'삼신<b>노트</b>',x:84,y:92,w:0,fontPx:null,bg:null},
  {id:'b'+rid(),type:'handle',html:n+' / '+String(n).padStart(2,'0'),x:850,y:96,w:0,fontPx:null,bg:null},
  {id:'b'+rid(),type:'qhead',html:'새 슬라이드 제목',x:84,y:520,w:0,fontPx:null,bg:null},
  {id:'b'+rid(),type:'bd',html:'본문 텍스트를 입력하세요.',x:84,y:700,w:760,fontPx:null,bg:null},
  {id:'b'+rid(),type:'dots',html:dotsHTML(n-1,n),x:470,y:1244,w:0,fontPx:null,bg:null},
]}; }
function addSlide(){ state.slides.push(newSlideObj(state.slides.length+1)); save(); setIndex(state.slides.length-1); }
function dupSlide(){ const c=JSON.parse(JSON.stringify(curSlide())); c.id='sl_'+rid(); c.blocks.forEach(b=>b.id='b'+rid()); c.name=curSlide().name+'_copy'; state.slides.splice(cur+1,0,c); save(); setIndex(cur+1); }
function delSlide(){ if(state.slides.length<=1){ alert('마지막 슬라이드는 삭제할 수 없습니다.'); return; } if(!confirm('이 슬라이드를 삭제할까요?'))return; state.slides.splice(cur,1); save(); setIndex(Math.min(cur,state.slides.length-1)); }

document.getElementById('saveAll').addEventListener('click',saveAll);
document.getElementById('helpToggle').addEventListener('click',()=>document.getElementById('hint').classList.toggle('show'));

/* ════════════════ 10. 시작 ════════════════ */
function init(reset){
  state=reset?preState():load(); cur=0;
  const start=()=>{ if(!state._baked) bakeLayout(); render(); };
  if(!state._baked && document.fonts && document.fonts.ready){ document.fonts.ready.then(start); setTimeout(()=>{ if(!state._baked) start(); },1500); }
  else start();
}
init(false);
</script>
