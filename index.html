<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>삼신노트 · 카드뉴스 에디터 (이미지·편집)</title>

<!-- Pretendard (산세리프 필수 조건) -->
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<!-- 이미지(PNG) 내보내기 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  /* ===== 디자인 토큰 ===== */
  :root{
    /* ── 에디터 UI 전용 (고정 — JS가 절대 변경하지 않음, 테마 영향 없음) ── */
    --ui-bg:#efece6;              /* 앱 배경 */
    --ui-surface:#f8f5ee;         /* 버튼·패널 표면 */
    --ui-ink:#2e2823;             /* UI 텍스트 */
    --ui-mute:#8a8175;            /* UI 보조 텍스트 */
    --ui-accent:#a07d38;          /* UI 포인트(골드) */
    --ui-accent-soft:#cbb489;     /* UI 포인트 연한색 */
    --ui-border:rgba(120,100,70,.28);
    --ui-danger:#b25a41;

    /* ── 캔버스(카드) 테마 기본값 — JS가 .stage/.card 범위에서 오버라이드 ── */
    --ink:#f3ebd9;          /* 카드 배경 */
    --ink-2:#ebe0cb;        /* 카드 표면 */
    --ivory:#2e2823;        /* 웜 아이보리 (메인 텍스트) */
    --mute:#8e8170;         /* 웜 그레이 (서브 텍스트) */
    --gold:#a07d38;         /* 샴페인 골드 (악센트) */
    --gold-soft:#cbb489;    /* 딤 골드 (헤어라인) */
    --red:#b25a41;          /* ❌ 톤 */
    --green:#6e7a41;        /* ⭕️ 톤 */
    --page:#e3d7c0;         /* 페이지(무대) 배경 */
    --body-ink:#4a4138;     /* 본문 글자 */
    --sub-ink:#6b5f50;      /* 표지 부제 글자 */
    --font: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

    /* 인스타 캐러셀 규격 (4:5) */
    --card-w:1080px;
    --card-h:1350px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    background:var(--ui-bg);
    font-family:var(--font);
    color:var(--ui-ink);
    -webkit-font-smoothing:antialiased;
  }

  /* ===== 상단 컨트롤 바 ===== */
  .toolbar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:14px 20px;
    background:rgba(248,245,238,.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--ui-border);
  }
  .brand-mark{
    font-weight:700; letter-spacing:.02em; font-size:15px;
    color:var(--ui-ink);
  }
  .brand-mark span{ color:var(--ui-accent); }
  .spacer{ flex:1 1 auto; }

  .btn{
    font-family:var(--font);
    font-size:13.5px; font-weight:600;
    color:var(--ui-ink);
    background:var(--ui-surface);
    border:1px solid var(--ui-border);
    border-radius:9px;
    padding:9px 14px;
    cursor:pointer;
    transition:.15s ease;
    white-space:nowrap;
  }
  .btn:hover{ border-color:var(--ui-accent); color:var(--ui-accent); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .btn.primary{
    background:var(--ui-accent); color:#fff; border-color:var(--ui-accent);
  }
  .btn.primary:hover{ background:#b8945a; color:#fff; }
  .counter{
    font-size:13.5px; color:var(--ui-mute);
    font-variant-numeric:tabular-nums; min-width:46px; text-align:center;
  }
  .counter b{ color:var(--ui-ink); font-weight:700; }

  /* 이미지 조절 컨트롤 (모든 카드에서 표시) */
  .cover-ctrl{ display:flex; align-items:center; gap:14px; width:100%;
    margin-top:2px; padding-top:12px; border-top:1px solid var(--ui-border); flex-wrap:wrap; }
  .cc-label{ font-size:13px; font-weight:700; color:var(--ui-accent); }
  .cover-ctrl .cc{ display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ui-mute); }
  .cover-ctrl input[type=range]{ width:118px; accent-color:var(--ui-accent); cursor:pointer; }
  .btn.sm2{ padding:6px 11px; font-size:12.5px; }

  /* ===== 무대(미리보기) ===== */
  .stage{
    display:flex; flex-direction:column; align-items:center;
    padding:28px 16px 40px;
    background:var(--page);        /* 테마의 '무대 배경'만 여기에 반영 (UI는 불변) */
    transition:background .15s;
  }
  .viewport{
    /* JS가 폭에 맞춰 scale을 계산해 카드를 줄여 보여줌 */
    position:relative;
    overflow:hidden;
    border-radius:14px;
    box-shadow:0 24px 60px rgba(120,100,70,.28);
  }
  .deck{
    position:relative;
    width:var(--card-w);
    height:var(--card-h);
    transform-origin:top left;
  }

  /* 카드들을 같은 자리에 쌓고 active만 표시 */
  .card{
    position:absolute; inset:0;
    width:var(--card-w); height:var(--card-h);
    background:var(--ink);
    display:none;
    overflow:hidden;
  }
  .card.active{ display:block; }

  /* 카드 공통 레이아웃 */
  .inner{
    position:absolute; inset:0;
    z-index:3;                 /* 텍스트를 이미지 레이어 위로 */
    padding:96px 84px 84px;
    display:flex; flex-direction:column;
    /* 한국어는 어절(단어) 단위로 줄바꿈 — "기대해봅니/다" 처럼 글자 중간에서 끊기지 않게 */
    word-break:keep-all;
    line-break:strict;
    overflow-wrap:break-word;
  }
  /* 미세한 골드 글로우 (상단) */
  .card::before{
    content:""; position:absolute; left:0; right:0; top:0; height:520px; z-index:2;
    background:radial-gradient(120% 80% at 18% 0%, rgba(160,125,56,.10), transparent 60%);
    pointer-events:none;
  }

  /* 이미지 레이어(줌·위치 조절) + 오버레이 — 모든 카드 공통 */
  .cover-bg{ position:absolute; inset:0; z-index:0; overflow:hidden; background-position:center; background-repeat:no-repeat; }
  .cover-overlay{
    position:absolute; inset:0; z-index:1; pointer-events:none;
    opacity:0; transition:opacity .12s;           /* 투명도는 JS에서 카드별로 제어 */
    background:linear-gradient(180deg,
      rgba(243,235,217,.86) 0%,
      rgba(243,235,217,.60) 34%,
      rgba(243,235,217,.64) 66%,
      rgba(243,235,217,.90) 100%);
  }
  .card.has-img .inner{ text-shadow:0 1px 3px rgba(255,250,240,.6); }

  .cover-card{ background:var(--ink); }
  .cover-card .inner{ text-shadow:0 1px 3px rgba(255,250,240,.6); }

  .top{ display:flex; align-items:center; justify-content:flex-end; }
  .eyebrow{
    font-size:30px; font-weight:600; letter-spacing:.01em;
    color:var(--gold);
  }
  .pageno{
    font-size:26px; font-weight:700; letter-spacing:.14em;
    color:var(--mute); font-variant-numeric:tabular-nums;
  }
  .pageno b{ color:var(--gold); }
  /* 본문 페이지 대형 제목(표지 헤드라인급) */
  .qtitle{ font-size:62px; font-weight:800; color:var(--ivory); line-height:1.24; letter-spacing:-.02em; }
  .qbody{ margin-top:46px; }

  .main{ flex:1 1 auto; display:flex; flex-direction:column; justify-content:center; }

  .foot{ display:flex; align-items:center; gap:18px; }
  .foot .rule{ flex:1 1 auto; height:1px; background:linear-gradient(90deg,var(--gold-soft),transparent); }
  .foot .sig{ font-size:26px; font-weight:700; letter-spacing:.02em; color:var(--ivory); }
  .foot .sig i{ color:var(--gold); font-style:normal; }

  /* 타이포 위계 */
  .display{ font-size:140px; font-weight:800; line-height:1.0; letter-spacing:-.02em; }

  /* 표지(다크 · 제품 크롭 없이 · 좌측정렬) */
  .cover-top{ display:flex; align-items:center; justify-content:space-between; }
  .cv-brand{ font-size:32px; font-weight:700; color:var(--ivory); letter-spacing:.01em; }
  .cv-brand i{ font-style:normal; color:var(--gold); }
  .cv-handle{ font-size:30px; font-weight:500; color:var(--mute); letter-spacing:.01em; }
  .cv-tag{ font-size:42px; font-weight:700; color:var(--gold); }
  .cv-title{ font-size:152px; font-weight:800; color:var(--ivory); line-height:1; letter-spacing:-.03em; margin-top:24px; }
  .cv-sub{ font-size:50px; font-weight:600; color:var(--sub-ink); line-height:1.42; margin-top:40px; }
  .cv-q{ font-size:80px; font-weight:800; color:var(--ivory); line-height:1.22; letter-spacing:-.02em; }
  .cv-products{ font-size:40px; font-weight:700; color:var(--gold); margin-top:36px; letter-spacing:.005em; }
  .h1{ font-size:84px; font-weight:800; line-height:1.12; letter-spacing:-.01em; }
  .h2{ font-size:58px; font-weight:700; line-height:1.24; }
  .lead{ font-size:50px; font-weight:600; line-height:1.42; color:var(--ivory); }
  .body{ font-size:44px; font-weight:400; line-height:1.5; color:var(--body-ink); }
  .note{ font-size:34px; font-weight:400; line-height:1.5; color:var(--mute); }
  .gold{ color:var(--gold); font-weight:700; }
  .iv{ color:var(--ivory); font-weight:700; }
  .mute{ color:var(--mute); }
  .red{ color:var(--red); font-weight:700; }
  .green{ color:var(--green); font-weight:700; }
  .mt-s{ margin-top:18px; }
  .mt-m{ margin-top:34px; }
  .mt-l{ margin-top:54px; }
  .mt-xl{ margin-top:72px; }

  /* 거대 비율 표기 */
  .ratio{ font-size:104px; font-weight:800; letter-spacing:.01em; line-height:1; color:var(--ivory); white-space:nowrap; }
  .ratio em{ color:var(--gold); font-style:normal; }

  /* 비교 블록 */
  .compare{ display:flex; flex-direction:column; gap:30px; }
  .cmp-row{ }
  .cmp-row .k{ font-size:38px; font-weight:600; color:var(--mute); }
  .cmp-row .v{ font-size:64px; font-weight:800; line-height:1.1; margin-top:6px; }

  /* 체크리스트 */
  .checks{ display:flex; flex-direction:column; gap:26px; }
  .chk{ display:flex; align-items:flex-start; gap:22px; font-size:48px; font-weight:600; line-height:1.3; }
  .chk .mk{ color:var(--gold); flex:0 0 auto; }

  /* 약사 평 카드의 X/O 라인 */
  .verdict{ display:flex; flex-direction:column; gap:22px; }
  .vline{ font-size:56px; font-weight:700; line-height:1.2; display:flex; align-items:center; gap:18px; }
  .vline .q{ color:#cfcabe; }
  .vline.no .q{ color:var(--mute); text-decoration:line-through; text-decoration-color:rgba(178,90,65,.5); }
  .vline.yes .q{ color:var(--ivory); }

  .pill{
    display:inline-block; margin-top:10px;
    font-size:34px; font-weight:700; color:var(--gold);
    border:1px solid var(--gold-soft); border-radius:999px;
    padding:14px 28px;
  }

  /* ===== 편집 모드 ===== */
  body.editing [data-edit]{
    outline:2px dashed var(--gold-soft); outline-offset:8px;
    border-radius:8px; cursor:text;
  }
  body.editing [data-edit]:hover{ outline-color:var(--gold); }
  body.editing [data-edit]:focus{ outline:2px solid var(--gold); background:rgba(160,125,56,.06); }

  /* ===== 서식 바 (편집 모드에서만 표시) ===== */
  .fmtbar{
    display:none; align-items:center; gap:8px; flex-wrap:wrap;
    position:sticky; top:var(--tbH,56px); z-index:48;
    padding:10px 20px;
    background:rgba(248,245,238,.96);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--ui-border);
  }
  body.editing .fmtbar{ display:flex; }
  .fmtbar .grp{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .fmtbar .sep{ width:1px; height:22px; background:var(--ui-border); margin:0 4px; }
  .fmtbar .lab{ font-size:12px; font-weight:700; color:var(--ui-accent); margin-right:2px; }
  .chip{
    font-family:var(--font); font-size:12.5px; font-weight:700;
    color:var(--ui-ink); background:var(--ui-surface);
    border:1px solid var(--ui-border); border-radius:8px;
    padding:6px 10px; cursor:pointer; transition:.12s ease; white-space:nowrap;
  }
  .chip:hover{ border-color:var(--ui-accent); color:var(--ui-accent); }
  .chip.warn{ color:var(--ui-danger); border-color:rgba(178,90,65,.4); }
  .chip.act{ background:var(--ui-accent); color:#fff; border-color:var(--ui-accent); }
  .chip.act:hover{ color:#fff; }
  .chip.pick{ display:inline-flex; flex-direction:column; align-items:center; gap:1px; padding:4px 10px 3px; }
  .chip .cur{ display:block; width:18px; height:3px; border-radius:2px; background:transparent; }
  .fmtbar input[type=number]{
    width:64px; font-family:var(--font); font-size:13px; font-weight:700;
    color:var(--ui-ink); padding:6px 8px; border:1px solid var(--ui-border);
    border-radius:8px; background:#fff;
  }
  .fmtbar input[type=number]:focus{ outline:none; border-color:var(--ui-accent); }
  .fmt-hint{ font-size:11.5px; color:var(--ui-mute); }

  /* ===== 색 팝오버 (형광펜/글자색) ===== */
  .popover{
    display:none; position:fixed; z-index:130;
    background:var(--ui-surface); border:1px solid var(--ui-border);
    border-radius:12px; box-shadow:0 16px 40px rgba(120,100,70,.30);
    padding:10px; width:196px;
  }
  .popover.on{ display:block; }
  .swatches{ display:grid; grid-template-columns:repeat(6,26px); gap:6px; margin-bottom:8px; }
  .swatch{
    width:26px; height:26px; border-radius:6px; padding:0;
    border:1px solid var(--ui-border); cursor:pointer; transition:.1s;
  }
  .swatch:hover{ transform:scale(1.14); }
  .swatch.none{ background:#fff; position:relative; }
  .swatch.none::after{ content:'∅'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--ui-mute); font-size:14px; }
  .pop-row{ display:flex; gap:6px; align-items:center; }
  .pop-row .pl{ flex:1 1 auto; font-size:11.5px; color:var(--ui-mute); }
  .pop-row input[type=color]{ width:34px; height:26px; border:1px solid var(--ui-border); border-radius:6px; background:#fff; padding:2px; cursor:pointer; }

  /* ===== 이모지 패널 ===== */
  .emoji-panel{
    display:none; position:fixed; z-index:120; right:20px;
    top:calc(var(--tbH2, var(--tbH,56px)) + 10px);
    width:344px; max-height:62vh; overflow:hidden;
    background:var(--ui-surface); border:1px solid var(--ui-border);
    border-radius:14px; box-shadow:0 20px 50px rgba(120,100,70,.30);
    flex-direction:column;
  }
  .emoji-panel.on{ display:flex; }
  .emoji-head{ padding:12px; border-bottom:1px solid var(--ui-border); }
  .emoji-head input{
    width:100%; font-family:var(--font); font-size:14px;
    padding:9px 12px; border-radius:9px;
    border:1px solid var(--ui-border); background:#fff; color:var(--ui-ink);
  }
  .emoji-head input:focus{ outline:none; border-color:var(--ui-accent); }
  .emoji-grid{
    padding:10px; overflow-y:auto;
    display:grid; grid-template-columns:repeat(7,1fr); gap:4px;
  }
  .emoji-cell{
    font-size:24px; line-height:1; text-align:center;
    padding:8px 0; border-radius:8px; cursor:pointer; background:transparent; border:none;
  }
  .emoji-cell:hover{ background:rgba(160,125,56,.15); }
  .emoji-empty{ grid-column:1 / -1; padding:20px; text-align:center; color:var(--ui-mute); font-size:13px; }
  .emoji-foot{ padding:8px 12px; border-top:1px solid var(--ui-border); font-size:11px; color:var(--ui-mute); }

  /* ===== 색상 테마 패널 ===== */
  .theme-panel{
    display:none; position:fixed; z-index:120; right:20px;
    top:calc(var(--tbH2, var(--tbH,56px)) + 10px);
    width:352px; max-height:70vh; overflow:hidden;
    background:var(--ui-surface); border:1px solid var(--ui-border);
    border-radius:14px; box-shadow:0 20px 50px rgba(120,100,70,.30);
    flex-direction:column;
  }
  .theme-panel.on{ display:flex; }
  .theme-head{ padding:12px; border-bottom:1px solid var(--ui-border); display:flex; align-items:center; justify-content:space-between; }
  .theme-head b{ font-size:14px; color:var(--ui-accent); }
  .theme-head span{ font-size:11px; color:var(--ui-mute); }
  .theme-scope{ display:flex; gap:6px; padding:10px 12px 0; }
  .scope-btn{
    flex:1; font-family:inherit; font-size:12px; font-weight:700;
    color:var(--ui-mute); background:#fff; border:1px solid var(--ui-border);
    border-radius:8px; padding:6px 0; cursor:pointer; transition:.12s;
  }
  .scope-btn.act{ color:#fff; background:var(--ui-accent); border-color:var(--ui-accent); }
  .theme-grp{ font-size:11px; font-weight:800; color:var(--ui-mute); letter-spacing:.06em; margin:8px 0 2px; }
  .theme-presets{ display:flex; flex-wrap:wrap; gap:6px; padding:10px 12px; border-bottom:1px solid var(--ui-border); }
  .theme-preset{ font-family:inherit; font-size:11.5px; font-weight:700; color:var(--ui-ink); border:1px solid var(--ui-border); background:#fff; border-radius:999px; padding:5px 11px; cursor:pointer; transition:.12s; }
  .theme-preset:hover{ border-color:var(--ui-accent); color:var(--ui-accent); }
  .theme-rows{ padding:6px 12px; overflow-y:auto; }
  .theme-row{ display:flex; align-items:center; gap:10px; padding:6px 0; }
  .theme-row .tl{ flex:1 1 auto; font-size:12.5px; color:var(--ui-ink); }
  .theme-row input[type=color]{ width:34px; height:26px; border:1px solid var(--ui-border); border-radius:6px; background:#fff; cursor:pointer; padding:2px; }
  .theme-row input[type=text]{ width:96px; font-family:var(--font); font-size:12px; padding:5px 8px; border:1px solid var(--ui-border); border-radius:7px; background:#fff; color:var(--ui-ink); text-transform:uppercase; }
  .theme-row input[type=text]:focus{ outline:none; border-color:var(--ui-accent); }
  .theme-foot{ padding:9px 12px; border-top:1px solid var(--ui-border); display:flex; justify-content:space-between; align-items:center; }
  .theme-foot span{ font-size:11px; color:var(--ui-mute); }

  /* ===== 토스트 ===== */
  .toast{
    position:fixed; z-index:200; left:50%; bottom:32px;
    transform:translateX(-50%) translateY(10px);
    background:var(--ui-ink); color:var(--ui-surface); font-size:13px; font-weight:600;
    padding:10px 16px; border-radius:10px; opacity:0; pointer-events:none;
    transition:.18s ease; max-width:80vw; text-align:center;
  }
  .toast.on{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* 로딩 오버레이 */
  .overlay{
    position:fixed; inset:0; z-index:100;
    display:none; align-items:center; justify-content:center;
    background:rgba(239,236,230,.86); backdrop-filter:blur(4px);
    color:var(--ui-ink); font-size:16px; font-weight:600;
  }
  .overlay.on{ display:flex; }
  .overlay .box{ text-align:center; }
  .overlay .bar{ margin-top:14px; width:240px; height:6px; background:#d8cfbc; border-radius:999px; overflow:hidden; }
  .overlay .bar i{ display:block; height:100%; width:0; background:var(--ui-accent); transition:width .2s; }

  .hint{ margin-top:18px; font-size:12.5px; color:var(--ui-mute); text-align:center; max-width:620px; line-height:1.7; }
</style>
</head>
<body>

  <!-- ===== 컨트롤 바 ===== -->
  <div class="toolbar">
    <div class="brand-mark">삼신<span>노트</span> · 카드뉴스 에디터</div>
    <div class="spacer"></div>
    <button class="btn" id="editToggle">✏️ 편집 모드</button>
    <button class="btn" id="prev">← 이전</button>

/* =========================================================
   문서 정규화 · 마이그레이션 (모든 로더가 경유: 부팅/가져오기/복원)
   - v1(구 0722 다운로드 파일): flat theme → { global, cards }
   - schema 2 보장: meta / theme.global·cards / floats(Phase 2 예약)
   ========================================================= */
const IMG_DEFAULT = { src:'', fit:'cover', zoom:1, px:50, py:50, overlay:0.85 };
function newDocId(){ return 'd_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function migrateDoc(raw){
  const d = (raw && typeof raw === 'object') ? raw : {};
  d.cover = Object.assign({ brand:'', handle:'', q:'', sub:'' }, d.cover || {});
  d.cards = Array.isArray(d.cards) ? d.cards : [];
  // 테마: v1 flat({--var:hex}) → v2({global, cards})
  let th = (d.theme && typeof d.theme === 'object') ? d.theme : {};
  if(!('global' in th) && !('cards' in th)) th = { global: th, cards: {} };
  th.global = (th.global && typeof th.global === 'object') ? th.global : {};
  th.cards  = (th.cards  && typeof th.cards  === 'object') ? th.cards  : {};
  d.theme = th;
  const now = Date.now();
  d.meta = Object.assign({ id:newDocId(), title:'', createdAt:now, updatedAt:now }, d.meta || {});
  // 이미지: 렌더 순서(표지+본문) 길이로 정규화
  const total = 1 + d.cards.length;
  if(!Array.isArray(d.images)) d.images = [];
  for(let i=0;i<total;i++) d.images[i] = Object.assign({}, IMG_DEFAULT, d.images[i] || {});
  d.images.length = total;
  // 자유 배치 요소(Phase 2): 카드별 배열
  if(!Array.isArray(d.floats)) d.floats = [];
  for(let i=0;i<total;i++) d.floats[i] = Array.isArray(d.floats[i]) ? d.floats[i] : [];
  d.floats.length = total;
  d.schema = 2;
  return d;
}

          <div class="qtitle" data-edit="cards.${j}.eyebrow">${c.eyebrow}</div>
          <div class="qbody" data-edit="cards.${j}.body">${c.body}</div>
        </div>
        <div class="foot">
          <div class="rule"></div>
          <div class="sig">삼신<i>노트</i></div>
        </div>
      </div>`;
    }
    deck.appendChild(el);
  }
  cards = [...deck.querySelectorAll('.card')];
  // 편집 리스너·contenteditable 재바인딩
  deck.querySelectorAll('[data-edit]').forEach(el=>{
    el.addEventListener('input', ()=>{ writeBack(el); noteTyping(el); });
    el.setAttribute('contenteditable', editing ? 'true' : 'false');
  });
  resetUndo();                                   // 문서 전환·복원 시 undo 이력 초기화
  applyThemeAll();                               // 전역(.stage)·카드별(.card) 테마 변수 적용
  for(let i=0;i<TOTAL;i++) loadNat(i);
  show(Math.max(0, Math.min(idx, TOTAL-1)));
}

/* ===== 편집 내용 → 데이터 반영 (자동저장·내보내기에 그대로 저장) ===== */
function writeBack(el){
  const path = el.dataset.edit;
  const html = el.innerHTML;
  if(path === 'cover.q'){ DOC.cover.q = html; markDirty(); return; }
  if(path === 'cover.sub'){ DOC.cover.sub = html; markDirty(); return; }
  const m = path.match(/^cards\.(\d+)\.(eyebrow|body)$/);
  if(m){ DOC.cards[+m[1]][m[2]] = html; markDirty(); }
}

/* ===== 편집 모드 토글 ===== */
let editing = false;
const editToggle = document.getElementById('editToggle');
editToggle.onclick = ()=>{
  editing = !editing;
  document.body.classList.toggle('editing', editing);
  document.querySelectorAll('[data-edit]').forEach(el=>{
    el.setAttribute('contenteditable', editing ? 'true' : 'false');
  });
  editToggle.classList.toggle('primary', editing);
  editToggle.textContent = editing ? '✓ 편집 중 (끄기)' : '✏️ 편집 모드';
  if(!editing){ commitTyping(); closePanels(); }
  requestAnimationFrame(()=>{ syncBars(); updateFmtState(); });   // 서식 바 표시 변화 반영
};

/* =========================================================
   이모지 삽입 + 시스템 프리셋(크기·강조) 적용
   ========================================================= */

/* --- 토스트 --- */
const toastEl = document.getElementById('toast');
let toastTimer = null;
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('on'), 1800);
}

/* --- 서식 바 위치를 툴바 높이에 맞춤 (패널은 서식 바 아래로: --tbH2) --- */
const toolbarEl = document.querySelector('.toolbar');
function syncBars(){
  const h = toolbarEl.offsetHeight;
  document.documentElement.style.setProperty('--tbH', h + 'px');
  const fb = document.getElementById('fmtBar');
  const h2 = h + ((fb && getComputedStyle(fb).display !== 'none') ? fb.offsetHeight : 0);
  document.documentElement.style.setProperty('--tbH2', h2 + 'px');
}
window.addEventListener('resize', syncBars);
syncBars();

/* --- 플로팅 패널 배타 관리 (L16: 컨텍스트 UI 표시는 여기 한 곳에서만) --- */
const PANELS = {};
function registerPanel(name, el, btn){ PANELS[name] = { el, btn }; }
function togglePanel(name){
  const wasOn = PANELS[name].el.classList.contains('on');
  Object.values(PANELS).forEach(p=>p.el.classList.remove('on'));
  if(!wasOn) PANELS[name].el.classList.add('on');
  return !wasOn;
}
function closePanels(){ Object.values(PANELS).forEach(p=>p.el.classList.remove('on')); }
document.addEventListener('mousedown', e=>{
  const inPanel = Object.values(PANELS).some(p =>
    p.el.contains(e.target) || p.btn === e.target || (p.btn && p.btn.contains(e.target)));
  if(!inPanel) closePanels();
});

/* --- 편집 영역 안의 선택(커서 위치) 기억 --- */
let savedRange = null, savedHost = null;
function editableHost(node){
  while(node && node !== document){
    if(node.nodeType === 1 && node.hasAttribute && node.hasAttribute('data-edit')) return node;
    node = node.parentNode;
  }
  return null;
}
let fmtStateRaf = 0;
document.addEventListener('selectionchange', ()=>{
  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const r = sel.getRangeAt(0);
  const host = editableHost(r.startContainer);
  if(host){ savedRange = r.cloneRange(); savedHost = host; }
  if(!fmtStateRaf){
    fmtStateRaf = requestAnimationFrame(()=>{ fmtStateRaf = 0; updateFmtState(); });
  }
});
function useSaved(){
  if(!savedRange) return null;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(savedRange);
  return sel;
}

/* =========================================================
   서식 엔진 (run 기반) — "파싱 → 배열 변환 → 최소 HTML 직렬화"
   · 서식 적용 시점에만 문단의 인라인 콘텐츠를 run(동일 스타일 구간) 배열로
     파싱하고, 순수 배열 연산으로 변환한 뒤 최소 HTML로 재직렬화한다.
   · 타이핑은 일반 contenteditable 그대로 (한글 IME·캐럿 무영향).
   · 규칙: line-height는 절대 스팬에 쓰지 않는다(문단 블록 전용, unitless).
   · 미지의 클래스/속성을 가진 요소·맨 span(.chk 플렉스 래퍼 등)은
     '구조 컨테이너'로 원형 보존한다 (run이 chain으로 소속을 기억).
   ========================================================= */
// 시스템 프리셋 값 (템플릿 타이포와 동일: [font-size px, font-weight])
const SIZE_MAP = { display:[140,800], h1:[84,800], h2:[58,700], lead:[50,600], body:[44,400], note:[34,400] };
// PPT식 크기 사다리 (가▲/가▼ 스테퍼)
const SIZE_LADDER = [24,28,32,36,40,44,50,58,66,76,84,104,120,140,160];

const RT_TOKENS = ['gold','iv','mute','red','green'];      // 색 토큰 → 클래스 직렬화(테마 반응)
const RT_TAGSTYLE = { B:{fw:700}, STRONG:{fw:700}, I:{it:true}, EM:{it:true},
                      U:{un:true}, S:{st:true}, STRIKE:{st:true}, DEL:{st:true} };
const RT_EMPTY = { fs:null, fw:null, it:false, un:false, st:false, color:null, hl:null, ls:null };

// 문단 블록: 노드에서 위로 올라가며 만나는 '가장 안쪽' DIV (없으면 호스트)
function paraOf(node, host){
  let el = node.nodeType === 3 ? node.parentNode : node;
  while(el && el !== host){
    if(el.nodeType === 1 && el.tagName === 'DIV') return el;
    el = el.parentNode;
  }
  return host;
}

// 기준 요소 시작부터 (container,offset)까지의 글자수
function charOffset(base, container, offset){
  const r = document.createRange();
  r.setStart(base, 0);
  r.setEnd(container, offset);
  return r.toString().length;
}
// 글자수 위치로 Range 복원(텍스트 노드 기준)
function rangeFromOffsets(base, start, end){
  const w = document.createTreeWalker(base, NodeFilter.SHOW_TEXT);
  let pos = 0, n, sN = null, sO = 0, eN = null, eO = 0;
  while((n = w.nextNode())){
    const len = n.nodeValue.length;
    if(sN === null && start <= pos + len){ sN = n; sO = Math.max(0, start - pos); }
    if(end <= pos + len){ eN = n; eO = Math.max(0, end - pos); break; }
    pos += len;
  }
  if(!sN){ sN = base; sO = base.childNodes.length; }
  if(!eN){ eN = base; eO = base.childNodes.length; }
  const r = document.createRange();
  r.setStart(sN, sO); r.setEnd(eN, eO);
  return r;
}

// 선택이 걸친 문단 목록 + 문단별 [start,end) 로컬 글자 오프셋
function parasInRange(range, host){
  const w = document.createTreeWalker(host, NodeFilter.SHOW_TEXT);
  const list = []; const seen = new Set();
  let n;
  while((n = w.nextNode())){
    if(!n.nodeValue.trim()) continue;              // 공백뿐인 노드(템플릿 들여쓰기)는 문단 탐색에서 제외
    if(!range.intersectsNode(n)) continue;
    const p = paraOf(n, host);
    if(!seen.has(p)){ seen.add(p); list.push(p); }
  }
  // 중첩 제거: 수집된 다른 문단 안에 포함된 문단은 바깥 것만 남김
  const outer = list.filter(p => !list.some(q => q !== p && q.contains(p)));
  return outer.map(p=>{
    const full = p.textContent.length;
    let s = 0, e = full;
    if(p === range.startContainer || p.contains(range.startContainer))
      s = charOffset(p, range.startContainer, range.startOffset);
    if(p === range.endContainer || p.contains(range.endContainer))
      e = charOffset(p, range.endContainer, range.endOffset);
    s = Math.max(0, Math.min(s, full)); e = Math.max(0, Math.min(e, full));
    return { el:p, start:s, end:e };
  }).filter(p => p.end > p.start);   // 경계만 스친 문단 제외 (인접 서식 보호)
}

/* --- 파싱: 요소의 인식 가능한 스타일 기여 추출 --- */
function cssColorToToken(val){
  const m = /^var\(--(gold|ivory|mute|red|green)\)$/.exec((val||'').trim());
  if(m) return m[1] === 'ivory' ? 'iv' : m[1];
  return val;                                   // hex/rgb 등은 원문 그대로
}
function styleCtxFromEl(el){
  const p = {};
  const tag = RT_TAGSTYLE[el.tagName];
  if(tag) Object.assign(p, tag);
  for(const c of el.classList){ if(RT_TOKENS.includes(c)) p.color = c; }
  const s = el.style;
  for(let i=0;i<s.length;i++){
    const prop = s[i], val = s.getPropertyValue(prop);
    if(prop === 'font-size'){
      const m = /^([\d.]+)px$/.exec(val);
      if(m) p.fs = parseFloat(m[1]); else p._impure = true;
    }
    else if(prop === 'font-weight'){
      const n = val === 'bold' ? 700 : val === 'normal' ? 400 : parseInt(val,10);
      if(n) p.fw = n; else p._impure = true;
    }
    else if(prop === 'font-style'){ if(val === 'italic') p.it = true; }
    else if(prop === 'text-decoration' || prop === 'text-decoration-line'){
      if(/underline/.test(val)) p.un = true;
      if(/line-through/.test(val)) p.st = true;
    }
    else if(prop === 'color'){ p.color = cssColorToToken(val); }
    else if(prop === 'background-color'){ p.hl = val; }
    else if(prop === 'letter-spacing'){ p.ls = val; }
    else if(prop === 'line-height'){ /* 스팬 줄간격은 의도적으로 폐기 — 문단 전용 */ }
    else p._impure = true;
  }
  return p;
}
// '순수 스타일 요소'(파싱 시 흡수 가능) 판정
function isPureStyleEl(el){
  const tn = el.tagName;
  if(!RT_TAGSTYLE[tn] && tn !== 'SPAN') return false;
  for(const a of el.attributes){
    if(!['class','style','data-fmt','data-size'].includes(a.name)) return false;
  }
  for(const c of el.classList){ if(!RT_TOKENS.includes(c)) return false; }
  if(styleCtxFromEl(el)._impure) return false;
  // 클래스도 스타일도 없는 맨 span은 구조 보존 (.chk 플렉스 래퍼 등 레이아웃 의미 가능)
  if(tn === 'SPAN' && el.classList.length === 0 && el.style.length === 0) return false;
  return true;
}

/* --- 파싱: 문단 → run 배열 --- */
function parseRuns(para){
  const runs = [];
  (function walk(node, ctx, chain){
    node.childNodes.forEach(child=>{
      if(child.nodeType === 3){
        if(child.nodeValue) runs.push(Object.assign({ text:child.nodeValue, chain }, RT_EMPTY, ctx));
        return;
      }
      if(child.nodeType !== 1) return;
      if(child.tagName === 'BR'){ runs.push({ br:true, chain }); return; }
      const hasText = child.textContent.length > 0 || !!child.querySelector('br');
      if(isPureStyleEl(child)){
        const p = styleCtxFromEl(child); delete p._impure;
        walk(child, Object.assign({}, ctx, p), chain);
      } else if(!hasText){
        runs.push({ atom: child.outerHTML, chain });     // 빈 요소·이미지 등 원형 보존
      } else {
        walk(child, ctx, chain.concat([child]));         // 구조 컨테이너: 소속만 기억
      }
    });
  })(para, {}, []);
  return runs;
}

/* --- 변환: 순수 배열 연산 --- */
function splitAt(runs, off){
  let pos = 0;
  for(let i=0;i<runs.length;i++){
    const r = runs[i], len = (r.br || r.atom) ? 0 : r.text.length;
    if(pos === off) return i;
    if(pos + len > off){
      const a = Object.assign({}, r, { text: r.text.slice(0, off-pos) });
      const b = Object.assign({}, r, { text: r.text.slice(off-pos) });
      runs.splice(i, 1, a, b);
      return i + 1;
    }
    pos += len;
  }
  return runs.length;
}
function patchRange(runs, start, end, patch){
  const i0 = splitAt(runs, start), i1 = splitAt(runs, end);
  for(let i=i0;i<i1;i++){
    const r = runs[i];
    if(r.br || r.atom) continue;
    Object.assign(r, (typeof patch === 'function') ? patch(r) : patch);
  }
  return mergeRuns(runs);
}
function mergeRuns(runs){
  const out = [];
  for(const r of runs){
    const p = out[out.length-1];
    if(p && !p.br && !r.br && !p.atom && !r.atom && p.chain === r.chain
       && p.fs===r.fs && p.fw===r.fw && p.it===r.it && p.un===r.un && p.st===r.st
       && p.color===r.color && p.hl===r.hl && p.ls===r.ls){
      p.text += r.text;
    } else out.push(r);
  }
  return out;
}

/* --- 직렬화: run 배열 → 최소 HTML (중첩 스팬·스팬 line-height 없음) --- */
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function runHtml(r){
  if(r.br) return '<br>';
  if(r.atom) return r.atom;
  const cls = [], st = [];
  if(r.color && RT_TOKENS.includes(r.color)) cls.push(r.color);
  else if(r.color) st.push('color:' + r.color);
  if(r.fs != null) st.push('font-size:' + r.fs + 'px');
  if(r.fw != null) st.push('font-weight:' + r.fw);
  if(r.it) st.push('font-style:italic');
  const deco = [];
  if(r.un) deco.push('underline');
  if(r.st) deco.push('line-through');
  if(deco.length) st.push('text-decoration:' + deco.join(' '));
  if(r.hl) st.push('background-color:' + r.hl);
  if(r.ls) st.push('letter-spacing:' + r.ls);
  const txt = escapeHtml(r.text);
  if(!cls.length && !st.length) return txt;
  return '<span' + (cls.length ? ' class="'+cls.join(' ')+'"' : '')
                 + (st.length ? ' style="'+st.join(';')+'"' : '') + '>' + txt + '</span>';
}
function openTagOf(el){
  const c = el.cloneNode(false);
  const o = c.outerHTML, close = '</' + c.tagName.toLowerCase() + '>';
  return o.endsWith(close) ? o.slice(0, o.length - close.length) : o;
}
function serializeRuns(runs){
  let html = '';
  let open = [];                                   // 현재 열린 구조 컨테이너 스택
  for(const r of runs){
    const chain = r.chain || [];
    let k = 0;
    while(k < open.length && k < chain.length && open[k] === chain[k]) k++;
    for(let i=open.length-1;i>=k;i--) html += '</' + open[i].tagName.toLowerCase() + '>';
    open = open.slice(0, k);
    for(let i=k;i<chain.length;i++){ html += openTagOf(chain[i]); open.push(chain[i]); }
    html += runHtml(r);
  }
  for(let i=open.length-1;i>=0;i--) html += '</' + open[i].tagName.toLowerCase() + '>';
  return html;
}

/* --- 적용 진입점 (인라인 서식) --- */
function applyInline(patch){
  if(!editing){ toast('편집 모드를 먼저 켜세요'); return; }
  const sel = useSaved();
  if(!sel || !sel.rangeCount){ toast('글자를 드래그해 선택하세요'); return; }
  const range = sel.getRangeAt(0);
  if(range.collapsed){ toast('수정할 글자를 먼저 선택하세요'); return; }
  const hostS = editableHost(range.startContainer);
  const hostE = editableHost(range.endContainer);
  if(!hostS || hostS !== hostE){ toast('편집 가능한 한 영역 안에서 선택해 주세요'); return; }
  const host = hostS;
  const paras = parasInRange(range, host);
  if(!paras.length){ toast('수정할 글자를 먼저 선택하세요'); return; }

  commitTyping();                                  // 타이핑 undo 단위 확정
  const before = host.innerHTML;
  for(const p of paras){
    p.el.innerHTML = serializeRuns(patchRange(parseRuns(p.el), p.start, p.end, patch));
  }
  const after = host.innerHTML;
  if(before !== after){
    pushUndo({ path: host.dataset.edit, before, after });
    lastCommitted.set(host.dataset.edit, after);
  }
  // 같은 글자 범위로 선택 복원
  const first = paras[0], last = paras[paras.length-1];
  const rs = rangeFromOffsets(first.el, first.start, first.start);
  const re = rangeFromOffsets(last.el, last.end, last.end);
  const nr = document.createRange();
  nr.setStart(rs.startContainer, rs.startOffset);
  nr.setEnd(re.endContainer, re.endOffset);
  sel.removeAllRanges(); sel.addRange(nr);
  savedRange = nr.cloneRange(); savedHost = host;
  writeBack(host);
  updateFmtState();
}

/* --- 적용 진입점 (문단 블록 서식: 정렬·줄간격·자간) --- */
function blockTargets(){
  if(!editing){ toast('편집 모드를 먼저 켜세요'); return null; }
  const sel = useSaved();
  if(!sel || !sel.rangeCount){ toast('문단을 먼저 클릭하세요'); return null; }
  const range = sel.getRangeAt(0);
  const host = editableHost(range.startContainer);
  if(!host){ toast('편집 가능한 문단을 클릭하세요'); return null; }
  let paras;
  if(range.collapsed){
    let p = paraOf(range.startContainer, host);
    paras = [p];
  } else {
    paras = parasInRange(range, host).map(p=>p.el);
    if(!paras.length) paras = [paraOf(range.startContainer, host)];
  }
  // 호스트 직속 서식은 writeBack(innerHTML만 저장)에서 유실 → 내용 전체를 div로 감싼 뒤 적용
  paras = paras.map(p=>{
    if(p !== host) return p;
    const wrap = document.createElement('div');
    wrap.dataset.line = '';
    while(host.firstChild) wrap.appendChild(host.firstChild);
    host.appendChild(wrap);
    return wrap;
  });
  return { host, paras };
}
function applyBlockStyle(fn){
  const t = blockTargets(); if(!t) return;
  commitTyping();
  const before = t.host.innerHTML;
  t.paras.forEach(fn);
  const after = t.host.innerHTML;
  if(before !== after){
    pushUndo({ path: t.host.dataset.edit, before, after });
    lastCommitted.set(t.host.dataset.edit, after);
  }
  writeBack(t.host);
  updateFmtState();
}

/* --- 크기 프리셋·스테퍼·강조·서식 지우기 --- */
function applySize(name){
  const v = SIZE_MAP[name]; if(!v) return;
  applyInline({ fs: v[0], fw: v[1] });
}
function applyColor(cls){ applyInline({ color: cls }); }
function clearFormat(){ applyInline(Object.assign({}, RT_EMPTY)); }
function blockBasePx(el){
  const v = parseFloat(getComputedStyle(el).fontSize);
  return isNaN(v) ? 44 : v;
}
function stepFontSize(dir){
  applyInline(r=>{
    // run별 현재 크기에서 사다리 한 칸 이동 (혼합 크기도 각자 이동)
    const base = r.fs != null ? r.fs : blockBasePx(savedHost ? paraOf(savedRange.startContainer, savedHost) : deck);
    let cur = base;
    if(dir > 0){
      const next = SIZE_LADDER.find(s => s > cur + 0.5);
      cur = next || Math.min(300, Math.round(cur * 1.15));
    } else {
      const smaller = SIZE_LADDER.filter(s => s < cur - 0.5);
      cur = smaller.length ? smaller[smaller.length-1] : Math.max(12, Math.round(cur / 1.15));
    }
    return { fs: cur };
  });
}

/* =========================================================
   실행 취소 / 다시 실행 (인메모리)
   · 필드 단위 {path, before, after} 스택. 타이핑은 1.5s 유휴/블러/서식 적용
     시 커밋. IME(한글 조합) 중에는 절대 커밋하지 않음.
   ========================================================= */
const undoStack = [], redoStack = [];
const UNDO_CAP = 100;
const lastCommitted = new Map();                   // path → 마지막 확정 innerHTML
const typingDirty = new Set();
let typingTimer = null, composing = false;
let updateFmtState = function(){};                  // 툴바 섹션에서 실제 구현으로 재정의

function pushUndo(e){
  undoStack.push(e);
  if(undoStack.length > UNDO_CAP) undoStack.shift();
  redoStack.length = 0;
  markDirty();
}
function noteTyping(el){
  typingDirty.add(el.dataset.edit);
  clearTimeout(typingTimer);
  typingTimer = setTimeout(()=>{ if(!composing) commitTyping(); }, 1500);
}
function commitTyping(){
  clearTimeout(typingTimer);
  typingDirty.forEach(path=>{
    const el = deck.querySelector(`[data-edit="${path}"]`);
    if(!el) return;
    const before = lastCommitted.has(path) ? lastCommitted.get(path) : el.innerHTML;
    const after = el.innerHTML;
    if(before !== after){
      pushUndo({ path, before, after });
      lastCommitted.set(path, after);
    }
  });
  typingDirty.clear();
}
function resetUndo(){
  undoStack.length = 0; redoStack.length = 0;
  typingDirty.clear(); clearTimeout(typingTimer);
  lastCommitted.clear();
  deck.querySelectorAll('[data-edit]').forEach(el=>lastCommitted.set(el.dataset.edit, el.innerHTML));
}
function applyUndoEntry(path, html){
  const el = deck.querySelector(`[data-edit="${path}"]`);
  if(!el) return;
  el.innerHTML = html;
  writeBack(el);
  lastCommitted.set(path, html);
}
function doUndo(){
  commitTyping();
  const e = undoStack.pop();
  if(!e){ toast('되돌릴 내용이 없어요'); return; }
  applyUndoEntry(e.path, e.before);
  redoStack.push(e);
  updateFmtState();
}
function doRedo(){
  commitTyping();
  const e = redoStack.pop();
  if(!e){ toast('다시 실행할 내용이 없어요'); return; }
  applyUndoEntry(e.path, e.after);
  undoStack.push(e);
  updateFmtState();
}
// 한글 IME 조합 가드
deck.addEventListener('compositionstart', ()=>{ composing = true; });
deck.addEventListener('compositionend', ()=>{
  composing = false;
  clearTimeout(typingTimer);
  typingTimer = setTimeout(commitTyping, 1500);
});
// Ctrl+Z / Ctrl+Y (Ctrl+Shift+Z) / Ctrl+B·I·U
document.addEventListener('keydown', e=>{
  if(!editing) return;
  const t = e.target;
  if(t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
  if(!(e.ctrlKey || e.metaKey)) return;
  const k = e.key.toLowerCase();
  if(k === 'z' && !e.shiftKey){ e.preventDefault(); doUndo(); }
  else if(k === 'y' || (k === 'z' && e.shiftKey)){ e.preventDefault(); doRedo(); }
  else if(k === 'b'){ e.preventDefault(); fmtToggle('b'); }
  else if(k === 'i'){ e.preventDefault(); fmtToggle('i'); }
  else if(k === 'u'){ e.preventDefault(); fmtToggle('u'); }
});

/* =========================================================
   PPT식 서식 바 — 배선 + 선택 상태 실시간 반영
   · mousedown preventDefault로 선택 유지 (L4), input은 예외
   · 팝오버(형광펜/글자색)는 패널 관리자에 등록 → 배타 표시 (L16)
   ========================================================= */

const TOKEN_BOLD = { gold:1, iv:1, red:1, green:1 };
function tokenColor(tok){
  const map = { gold:'--gold', iv:'--ivory', mute:'--mute', red:'--red', green:'--green' };
  if(!map[tok]) return null;
  const base = document.querySelector('.stage') || document.documentElement;
  return getComputedStyle(base).getPropertyValue(map[tok]).trim() || null;
}
function refocusSelection(){
  if(!savedHost) return;
  savedHost.focus();
  if(savedRange){ const s = getSelection(); s.removeAllRanges(); s.addRange(savedRange); }
}

/* --- 현재 선택의 유효 서식 상태 --- */
function selectionState(){
  const st = { has:false, caret:false, fs:null, fsMixed:false, blockPx:null,
               bold:false, it:false, un:false, stk:false,
               color:null, hl:null, align:null, lh:null };
  if(!savedRange || !savedHost || !document.body.contains(savedHost)) return st;
  const range = savedRange, host = savedHost;
  let paras;
  if(range.collapsed){
    const p = paraOf(range.startContainer, host);
    const off = charOffset(p, range.startContainer, range.startOffset);
    paras = [{ el:p, start:off, end:off }];
    st.caret = true;
  } else {
    paras = parasInRange(range, host);
  }
  if(!paras.length) return st;
  st.has = true;
  const pEl = paras[0].el;
  const cs = getComputedStyle(pEl);
  st.blockPx = parseFloat(cs.fontSize) || null;
  st.align = cs.textAlign === 'start' ? 'left' : cs.textAlign;
  st.lh = pEl.style && pEl.style.lineHeight ? parseFloat(pEl.style.lineHeight) : null;

  // 선택 구간 run 수집 (커서면 커서가 놓인 run 하나)
  const sel = [];
  for(const p of paras){
    const runs = parseRuns(p.el);
    if(st.caret){
      let pos = 0;
      for(const r of runs){
        const len = (r.br || r.atom) ? 0 : r.text.length;
        if(!r.br && !r.atom && p.end <= pos + len){ sel.push(r); break; }
        pos += len;
      }
    } else {
      const i0 = splitAt(runs, p.start), i1 = splitAt(runs, p.end);
      sel.push(...runs.slice(i0, i1).filter(r=>!r.br && !r.atom));
    }
  }
  if(!sel.length){ st.fs = st.blockPx; return st; }
  const fsSet = new Set(), colorSet = new Set(), hlSet = new Set();
  let allB = true, allI = true, allU = true, allS = true;
  for(const r of sel){
    fsSet.add(r.fs); colorSet.add(r.color); hlSet.add(r.hl);
    const b = r.fw != null ? r.fw >= 600 : !!(r.color && TOKEN_BOLD[r.color]);
    allB = allB && b; allI = allI && r.it; allU = allU && r.un; allS = allS && r.st;
  }
  st.bold = allB; st.it = allI; st.un = allU; st.stk = allS;
  if(fsSet.size === 1){ const v = [...fsSet][0]; st.fs = v == null ? st.blockPx : v; }
  else st.fsMixed = true;
  if(colorSet.size === 1) st.color = [...colorSet][0];
  if(hlSet.size === 1) st.hl = [...hlSet][0];
  return st;
}

/* --- 툴바에 상태 반영 --- */
updateFmtState = function(){
  if(!editing) return;
  const st = selectionState();
  const setAct = (el, on)=>el.classList.toggle('act', !!on);
  if(document.activeElement !== fsInput){
    fsInput.value = (st.has && !st.fsMixed && st.fs) ? Math.round(st.fs) : '';
  }
  setAct(fmtB, st.has && st.bold);
  setAct(fmtI, st.has && st.it);
  setAct(fmtU, st.has && st.un);
  setAct(fmtS, st.has && st.stk);
  alignBtns.forEach(b=>setAct(b, st.has && st.align === b.dataset.align));
  const fgc = st.color ? (RT_TOKENS.includes(st.color) ? tokenColor(st.color) : st.color) : null;
  fgCur.style.background = fgc || 'transparent';
  hlCur.style.background = st.hl || 'transparent';
};

/* --- 크기 입력·스테퍼 --- */
function applyFsInput(){
  const v = parseFloat(fsInput.value);
  if(isNaN(v)) return;
  applyInline({ fs: Math.max(12, Math.min(300, Math.round(v))) });
  fsInput.blur();
  refocusSelection();
}
fsInput.addEventListener('keydown', e=>{ if(e.key === 'Enter'){ e.preventDefault(); applyFsInput(); } });
fsInput.addEventListener('change', applyFsInput);
document.getElementById('fsUp').addEventListener('click', ()=>stepFontSize(1));
document.getElementById('fsDown').addEventListener('click', ()=>stepFontSize(-1));

/* --- B/I/U/S 토글 (버튼 + Ctrl 단축키 공용) --- */
function fmtToggle(kind){
  const st = selectionState();
  if(kind === 'b') applyInline({ fw: st.bold ? 400 : 700 });
  else if(kind === 'i') applyInline({ it: !st.it });
  else if(kind === 'u') applyInline({ un: !st.un });
  else if(kind === 's') applyInline({ st: !st.stk });
}
fmtB.addEventListener('click', ()=>fmtToggle('b'));

function stepLineHeight(dir){
  applyBlockStyle(p=>{
    const cs = getComputedStyle(p);
    let cur = parseFloat(p.style.lineHeight);
    if(isNaN(cur)){
      const lh = parseFloat(cs.lineHeight), fs = parseFloat(cs.fontSize);
      cur = (lh && fs) ? lh / fs : 1.5;
    }
    const nv = Math.round((cur + dir * 0.1) * 10) / 10;
    p.style.lineHeight = Math.max(1.0, Math.min(2.4, nv));   // unitless만 (스팬 금지 규칙과 세트)
  });
}
function stepLetterSpacing(dir){
  applyBlockStyle(p=>{
    const cs = getComputedStyle(p);
    let cur;
    if(p.style.letterSpacing && p.style.letterSpacing.endsWith('em')) cur = parseFloat(p.style.letterSpacing);
    else { const px = parseFloat(cs.letterSpacing), fs = parseFloat(cs.fontSize); cur = (px && fs) ? px / fs : 0; }
    if(isNaN(cur)) cur = 0;
    let nv = Math.round((cur + dir * 0.01) * 1000) / 1000;
    nv = Math.max(-0.1, Math.min(0.5, nv));
    p.style.letterSpacing = nv + 'em';
  });
}

function insertEmoji(ch){
  if(!editing){ toast('편집 모드를 켜고 위치를 클릭하세요'); return; }
  if(!savedRange || !savedHost){ toast('삽입할 위치를 카드에서 먼저 클릭하세요'); return; }
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(savedRange);
  const range = sel.getRangeAt(0);
  range.deleteContents();
  const node = document.createTextNode(ch);
  range.insertNode(node);
  range.setStartAfter(node); range.setEndAfter(node); range.collapse(true);
  sel.removeAllRanges(); sel.addRange(range);
  savedRange = range.cloneRange();
  writeBack(savedHost);
}

function normHex(s){
  s = (s || '').trim();
  if(s && s[0] !== '#') s = '#' + s;
  return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : null;
}

const stageEl = document.querySelector('.stage');
let themeScope = 'global';                          // 'global' | 'card'

/* --- 테마 적용 (스코프별) --- */
function applyThemeGlobal(){
  THEME_VARS.forEach(t=>stageEl.style.removeProperty(t.v));
  Object.entries(DOC.theme.global).forEach(([v,val])=>{
    if(normHex(val)) stageEl.style.setProperty(v, val);
  });
}
function applyCardTheme(i){
  const card = cards[i]; if(!card) return;
  THEME_VARS.forEach(t=>card.style.removeProperty(t.v));
  const ov = DOC.theme.cards[String(i)];
  if(ov) Object.entries(ov).forEach(([v,val])=>{
    if(normHex(val)) card.style.setProperty(v, val);
  });
  applyOverlayColor(i);
}
function applyThemeAll(){
  applyThemeGlobal();
  for(let i=0;i<TOTAL;i++) applyCardTheme(i);
}

/* --- 이미지 오버레이 색: 카드 배경(--ink)에서 계산 (html2canvas 호환 위해 JS로) --- */
function hexToRgb(hx){
  const n = parseInt(hx.slice(1), 16);
  return [ (n>>16)&255, (n>>8)&255, n&255 ];
}
function effectiveInk(i){
  const ov = DOC.theme.cards[String(i)];
  return (ov && ov['--ink']) || DOC.theme.global['--ink'] || '#f3ebd9';
}
function applyOverlayColor(i){
  const card = cards[i]; if(!card) return;
  const ov = card.querySelector('.cover-overlay'); if(!ov) return;
  const [r,g,b] = hexToRgb(effectiveInk(i));
  ov.style.background = `linear-gradient(180deg, rgba(${r},${g},${b},.86) 0%, rgba(${r},${g},${b},.60) 34%, rgba(${r},${g},${b},.64) 66%, rgba(${r},${g},${b},.90) 100%)`;
}

/* --- 패널이 보여주는 현재 값 (스코프 반영) --- */
function currentColor(v){
  const def = (THEME_VARS.find(t=>t.v===v)||{}).def || '#000000';
  if(themeScope === 'card'){
    const ov = DOC.theme.cards[String(idx)];
    return (ov && ov[v]) || DOC.theme.global[v] || def;
  }
  return DOC.theme.global[v] || def;
}
function setThemeVar(v, val){
  const hx = normHex(val);
  if(!hx) return false;
  if(themeScope === 'card'){
    const key = String(idx);
    (DOC.theme.cards[key] = DOC.theme.cards[key] || {})[v] = hx;
    applyCardTheme(idx);
  } else {
    DOC.theme.global[v] = hx;
    applyThemeGlobal();
    for(let i=0;i<TOTAL;i++) applyOverlayColor(i);
  }
  markDirty();
  return true;
}

/* ===== 카드별 이미지 적용 (비율 유지) ===== */
function applyCardImg(i){
  const card = cards[i];
  if(!card) return;
  const bg = card.querySelector('.cover-bg');
  const ov = card.querySelector('.cover-overlay');
  const im = DOC.images[i];
  if(!bg || !im) return;

  if(im.src){
    bg.style.backgroundImage = `url("${im.src}")`;
    const cw = 1080, ch = 1350;                        // 카드 실제 픽셀 비율(4:5)
    const natW = im._natW || cw, natH = im._natH || ch;
    const ir = natW / natH, cr = cw / ch;              // 이미지·컨테이너 종횡비
    let bw, bh;                                        // 비율 유지한 배경 크기
    if(im.fit === 'cover'){                            // 꽉 채우기(크롭)
      if(ir > cr){ bh = ch; bw = ch * ir; } else { bw = cw; bh = cw / ir; }
    } else {                                           // 전체 보기(레터박스)
      if(ir > cr){ bw = cw; bh = cw / ir; } else { bh = ch; bw = ch * ir; }
    }
    bw *= im.zoom; bh *= im.zoom;                      // 확대 배율(비율 유지)
    bg.style.backgroundSize = `${bw}px ${bh}px`;
    bg.style.backgroundPosition = `${im.px}% ${im.py}%`;
    ov.style.opacity = im.overlay;                     // 오버레이 투명도
    card.classList.add('has-img');
  } else {
    bg.style.backgroundImage = 'none';
    ov.style.opacity = 0;                              // 이미지 없으면 오버레이도 숨김
    card.classList.remove('has-img');
  }
}
// 이미지 원본 크기를 읽어온 뒤 적용(왜곡 방지의 핵심)
function loadNat(i){
  const im = DOC.images[i];
  if(!im){ return; }
  if(!im.src){ applyCardImg(i); return; }
  const img = new Image();
  img.onload = ()=>{ im._natW = img.naturalWidth; im._natH = img.naturalHeight; applyCardImg(i); };
  img.onerror = ()=>{ applyCardImg(i); };
  img.src = im.src;
}

const viewport = document.getElementById('viewport');
const CARD_W = 1080, CARD_H = 1350;
function fit(){
  const maxW = Math.min(window.innerWidth - 32, 520); // 미리보기 최대 폭
  const scale = maxW / CARD_W;
  deck.style.transform = `scale(${scale})`;
  viewport.style.width  = (CARD_W*scale) + 'px';
  viewport.style.height = (CARD_H*scale) + 'px';
}

const overlay = document.getElementById('overlay');

const OUT_SCALE = 2; // 1080x1350 의 2배 = 2160x2700 고해상도

async function captureCard(i){
  const card = cards[i];
  const wasActive = card.classList.contains('active');
  const prevTransform = deck.style.transform;
  const prevW = viewport.style.width, prevH = viewport.style.height;
  const wasEditing = document.body.classList.contains('editing');

  document.body.classList.remove('editing');        // 편집 점선이 캡처되지 않도록
  cards.forEach(c=>c.classList.remove('active'));
  card.classList.add('active');
  deck.style.transform = 'none';
  viewport.style.width = CARD_W+'px';
  viewport.style.height = CARD_H+'px';

  await document.fonts.ready;                        // 폰트 로딩 완료 대기
  await new Promise(r=>requestAnimationFrame(r));

  const canvas = await html2canvas(card, {
    width: CARD_W, height: CARD_H,
    windowWidth: CARD_W, windowHeight: CARD_H,
    scale: OUT_SCALE,
    backgroundColor: null,
    useCORS: true,
    logging: false,
  });

  // 원상복구
  deck.style.transform = prevTransform;
  viewport.style.width = prevW; viewport.style.height = prevH;
  cards.forEach(c=>c.classList.remove('active'));
  if(wasActive) card.classList.add('active'); else cards[idx].classList.add('active');
  if(wasEditing) document.body.classList.add('editing');

  return canvas;
}

function canvasToBlob(canvas){
  return new Promise(res => canvas.toBlob(res, 'image/png'));
}

// 단일 카드 다운로드
document.getElementById('exportOne').onclick = async ()=>{
  overlay.classList.add('on'); ovText.textContent='이미지 생성 중…'; ovBar.style.width='40%';
  try{
    const canvas = await captureCard(idx);
    ovBar.style.width='90%';
    const blob = await canvasToBlob(canvas);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `samsinnote_card_${String(idx+1).padStart(2,'0')}.png`;
    a.click();
    URL.revokeObjectURL(a.href);
    ovBar.style.width='100%';
  }catch(err){ alert('내보내기 실패: '+err.message); }
  finally{ setTimeout(()=>{overlay.classList.remove('on'); ovBar.style.width='0';},300); show(idx); }
};

// 전체 이미지 순차 다운로드
document.getElementById('exportAll').onclick = async ()=>{
  overlay.classList.add('on');
  try{
    for(let i=0;i<TOTAL;i++){
      ovText.textContent = `이미지 저장 중… (${i+1}/${TOTAL})`;
      ovBar.style.width = `${Math.round(((i+1)/TOTAL)*100)}%`;
      const canvas = await captureCard(i);
      const blob = await canvasToBlob(canvas);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `samsinnote_card_${String(i+1).padStart(2,'0')}.png`;
      a.click();
      await new Promise(r=>setTimeout(r, 500));  // 브라우저 다중 다운로드 간격
      URL.revokeObjectURL(a.href);
    }
  }catch(err){ alert('내보내기 실패: '+err.message); }
  finally{ setTimeout(()=>{overlay.classList.remove('on'); ovBar.style.width='0';},300); show(idx); }
};

/* ===== HTML 파일로 받기 (편집·이미지 상태를 그대로 저장) ===== */
document.getElementById('downloadHtml').onclick = function(){
  // 편집 내용은 input 이벤트로 이미 DOC에 반영됨. 내부 캐시(_natW 등)만 제거.
  DOC.meta.updatedAt = Date.now();
  const clean = JSON.parse(JSON.stringify(DOC, (k,v)=> (k==='_natW'||k==='_natH') ? undefined : v));
  const dataJs = '/*__DATA_START__*/\nconst APP_DATA = ' + JSON.stringify(clean) + ';\n/*__DATA_END__*/';
  const out = ORIGINAL_HTML.replace(/\/\*__DATA_START__\*\/[\s\S]*?\/\*__DATA_END__\*\//, function(){ return dataJs; });
  const blob = new Blob([out], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'samsinnote_cardnews.html';
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
};
