<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>삼신노트 · 카드뉴스 에디터 (이미지·편집)</title>

<!-- Pretendard (산세리프 필수 조건) -->
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<!-- 이미지(PNG) 내보내기 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  /* ===== 디자인 토큰 ===== */
  :root{
    --ink:#f3ebd9;          /* 잉크 블랙 배경 */
    --ink-2:#ebe0cb;        /* 카드 표면 */
    --ivory:#2e2823;        /* 웜 아이보리 (메인 텍스트) */
    --mute:#8e8170;         /* 웜 그레이 (서브 텍스트) */
    --gold:#a07d38;         /* 샴페인 골드 (악센트) */
    --gold-soft:#cbb489;    /* 딤 골드 (헤어라인) */
    --red:#b25a41;          /* ❌ 톤 */
    --green:#6e7a41;        /* ⭕️ 톤 */
    --page:#e3d7c0;         /* 페이지(무대) 배경 */
    --body-ink:#4a4138;     /* 본문 글자 */
    --sub-ink:#6b5f50;      /* 표지 부제 글자 */
    --font: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

    /* 인스타 캐러셀 규격 (4:5) */
    --card-w:1080px;
    --card-h:1350px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    background:var(--page);
    font-family:var(--font);
    color:var(--ivory);
    -webkit-font-smoothing:antialiased;
  }

  /* ===== 상단 컨트롤 바 ===== */
  .toolbar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:14px 20px;
    background:rgba(243,235,217,.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(160,125,56,.28);
  }
  .brand-mark{
    font-weight:700; letter-spacing:.02em; font-size:15px;
    color:var(--ivory);
  }
  .brand-mark span{ color:var(--gold); }
  .spacer{ flex:1 1 auto; }

  .btn{
    font-family:var(--font);
    font-size:13.5px; font-weight:600;
    color:var(--ivory);
    background:#f7f0e0;
    border:1px solid rgba(120,100,70,.28);
    border-radius:9px;
    padding:9px 14px;
    cursor:pointer;
    transition:.15s ease;
    white-space:nowrap;
  }
  .btn:hover{ border-color:var(--gold); color:var(--gold); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .btn.primary{
    background:var(--gold); color:#1a1409; border-color:var(--gold);
  }
  .btn.primary:hover{ background:#dab974; color:#1a1409; }
  .counter{
    font-size:13.5px; color:var(--mute);
    font-variant-numeric:tabular-nums; min-width:46px; text-align:center;
  }
  .counter b{ color:var(--ivory); font-weight:700; }

  /* 이미지 조절 컨트롤 (모든 카드에서 표시) */
  .cover-ctrl{ display:flex; align-items:center; gap:14px; width:100%;
    margin-top:2px; padding-top:12px; border-top:1px solid rgba(160,125,56,.22); flex-wrap:wrap; }
  .cc-label{ font-size:13px; font-weight:700; color:var(--gold); }
  .cover-ctrl .cc{ display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--mute); }
  .cover-ctrl input[type=range]{ width:118px; accent-color:var(--gold); cursor:pointer; }
  .btn.sm2{ padding:6px 11px; font-size:12.5px; }

  /* ===== 무대(미리보기) ===== */
  .stage{
    display:flex; flex-direction:column; align-items:center;
    padding:28px 16px 40px;
  }
  .viewport{
    /* JS가 폭에 맞춰 scale을 계산해 카드를 줄여 보여줌 */
    position:relative;
    overflow:hidden;
    border-radius:14px;
    box-shadow:0 24px 60px rgba(120,100,70,.28);
  }
  .deck{
    position:relative;
    width:var(--card-w);
    height:var(--card-h);
    transform-origin:top left;
  }

  /* 카드들을 같은 자리에 쌓고 active만 표시 */
  .card{
    position:absolute; inset:0;
    width:var(--card-w); height:var(--card-h);
    background:var(--ink);
    display:none;
    overflow:hidden;
  }
  .card.active{ display:block; }

  /* 카드 공통 레이아웃 */
  .inner{
    position:absolute; inset:0;
    z-index:3;                 /* 텍스트를 이미지 레이어 위로 */
    padding:96px 84px 84px;
    display:flex; flex-direction:column;
    /* 한국어는 어절(단어) 단위로 줄바꿈 — "기대해봅니/다" 처럼 글자 중간에서 끊기지 않게 */
    word-break:keep-all;
    line-break:strict;
    overflow-wrap:break-word;
  }
  /* 미세한 골드 글로우 (상단) */
  .card::before{
    content:""; position:absolute; left:0; right:0; top:0; height:520px; z-index:2;
    background:radial-gradient(120% 80% at 18% 0%, rgba(160,125,56,.10), transparent 60%);
    pointer-events:none;
  }

  /* 이미지 레이어(줌·위치 조절) + 오버레이 — 모든 카드 공통 */
  .cover-bg{ position:absolute; inset:0; z-index:0; overflow:hidden; background-position:center; background-repeat:no-repeat; }
  .cover-overlay{
    position:absolute; inset:0; z-index:1; pointer-events:none;
    opacity:0; transition:opacity .12s;           /* 투명도는 JS에서 카드별로 제어 */
    background:linear-gradient(180deg,
      rgba(243,235,217,.86) 0%,
      rgba(243,235,217,.60) 34%,
      rgba(243,235,217,.64) 66%,
      rgba(243,235,217,.90) 100%);
  }
  .card.has-img .inner{ text-shadow:0 1px 3px rgba(255,250,240,.6); }

  .cover-card{ background:var(--ink); }
  .cover-card .inner{ text-shadow:0 1px 3px rgba(255,250,240,.6); }

  .top{ display:flex; align-items:center; justify-content:flex-end; }
  .eyebrow{
    font-size:30px; font-weight:600; letter-spacing:.01em;
    color:var(--gold);
  }
  .pageno{
    font-size:26px; font-weight:700; letter-spacing:.14em;
    color:var(--mute); font-variant-numeric:tabular-nums;
  }
  .pageno b{ color:var(--gold); }
  /* 본문 페이지 대형 제목(표지 헤드라인급) */
  .qtitle{ font-size:62px; font-weight:800; color:var(--ivory); line-height:1.24; letter-spacing:-.02em; }
  .qbody{ margin-top:46px; }

  .main{ flex:1 1 auto; display:flex; flex-direction:column; justify-content:center; }

  .foot{ display:flex; align-items:center; gap:18px; }
  .foot .rule{ flex:1 1 auto; height:1px; background:linear-gradient(90deg,var(--gold-soft),transparent); }
  .foot .sig{ font-size:26px; font-weight:700; letter-spacing:.02em; color:var(--ivory); }
  .foot .sig i{ color:var(--gold); font-style:normal; }

  /* 타이포 위계 */
  .display{ font-size:140px; font-weight:800; line-height:1.0; letter-spacing:-.02em; }

  /* 표지(다크 · 제품 크롭 없이 · 좌측정렬) */
  .cover-top{ display:flex; align-items:center; justify-content:space-between; }
  .cv-brand{ font-size:32px; font-weight:700; color:var(--ivory); letter-spacing:.01em; }
  .cv-brand i{ font-style:normal; color:var(--gold); }
  .cv-handle{ font-size:30px; font-weight:500; color:var(--mute); letter-spacing:.01em; }
  .cv-tag{ font-size:42px; font-weight:700; color:var(--gold); }
  .cv-title{ font-size:152px; font-weight:800; color:var(--ivory); line-height:1; letter-spacing:-.03em; margin-top:24px; }
  .cv-sub{ font-size:50px; font-weight:600; color:var(--sub-ink); line-height:1.42; margin-top:40px; }
  .cv-q{ font-size:80px; font-weight:800; color:var(--ivory); line-height:1.22; letter-spacing:-.02em; }
  .cv-products{ font-size:40px; font-weight:700; color:var(--gold); margin-top:36px; letter-spacing:.005em; }
  .h1{ font-size:84px; font-weight:800; line-height:1.12; letter-spacing:-.01em; }
  .h2{ font-size:58px; font-weight:700; line-height:1.24; }
  .lead{ font-size:50px; font-weight:600; line-height:1.42; color:var(--ivory); }
  .body{ font-size:44px; font-weight:400; line-height:1.5; color:var(--body-ink); }
  .note{ font-size:34px; font-weight:400; line-height:1.5; color:var(--mute); }
  .gold{ color:var(--gold); font-weight:700; }
  .iv{ color:var(--ivory); font-weight:700; }
  .mute{ color:var(--mute); }
  .mt-s{ margin-top:18px; }
  .mt-m{ margin-top:34px; }
  .mt-l{ margin-top:54px; }
  .mt-xl{ margin-top:72px; }

  /* 거대 비율 표기 */
  .ratio{ font-size:104px; font-weight:800; letter-spacing:.01em; line-height:1; color:var(--ivory); white-space:nowrap; }
  .ratio em{ color:var(--gold); font-style:normal; }

  /* 비교 블록 */
  .compare{ display:flex; flex-direction:column; gap:30px; }
  .cmp-row{ }
  .cmp-row .k{ font-size:38px; font-weight:600; color:var(--mute); }
  .cmp-row .v{ font-size:64px; font-weight:800; line-height:1.1; margin-top:6px; }

  /* 체크리스트 */
  .checks{ display:flex; flex-direction:column; gap:26px; }
  .chk{ display:flex; align-items:flex-start; gap:22px; font-size:48px; font-weight:600; line-height:1.3; }
  .chk .mk{ color:var(--gold); flex:0 0 auto; }

  /* 약사 평 카드의 X/O 라인 */
  .verdict{ display:flex; flex-direction:column; gap:22px; }
  .vline{ font-size:56px; font-weight:700; line-height:1.2; display:flex; align-items:center; gap:18px; }
  .vline .q{ color:#cfcabe; }
  .vline.no .q{ color:var(--mute); text-decoration:line-through; text-decoration-color:rgba(178,90,65,.5); }
  .vline.yes .q{ color:var(--ivory); }

  .pill{
    display:inline-block; margin-top:10px;
    font-size:34px; font-weight:700; color:var(--gold);
    border:1px solid var(--gold-soft); border-radius:999px;
    padding:14px 28px;
  }

  /* ===== 편집 모드 ===== */
  body.editing [data-edit]{
    outline:2px dashed var(--gold-soft); outline-offset:8px;
    border-radius:8px; cursor:text;
  }
  body.editing [data-edit]:hover{ outline-color:var(--gold); }
  body.editing [data-edit]:focus{ outline:2px solid var(--gold); background:rgba(160,125,56,.06); }

  /* ===== 서식 바 (편집 모드에서만 표시) ===== */
  .fmtbar{
    display:none; align-items:center; gap:8px; flex-wrap:wrap;
    position:sticky; top:var(--tbH,56px); z-index:48;
    padding:10px 20px;
    background:rgba(240,232,214,.96);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(160,125,56,.22);
  }
  body.editing .fmtbar{ display:flex; }
  .fmtbar .grp{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .fmtbar .sep{ width:1px; height:22px; background:rgba(160,125,56,.28); margin:0 4px; }
  .fmtbar .lab{ font-size:12px; font-weight:700; color:var(--gold); margin-right:2px; }
  .chip{
    font-family:var(--font); font-size:12.5px; font-weight:700;
    color:var(--ivory); background:#f7f0e0;
    border:1px solid rgba(120,100,70,.28); border-radius:8px;
    padding:6px 10px; cursor:pointer; transition:.12s ease; white-space:nowrap;
  }
  .chip:hover{ border-color:var(--gold); color:var(--gold); }
  .chip.c-gold{ color:var(--gold); }
  .chip.c-iv{ color:var(--ivory); }
  .chip.c-mute{ color:var(--mute); }
  .chip.warn{ color:var(--red); border-color:rgba(178,90,65,.4); }
  .fmt-hint{ font-size:11.5px; color:var(--mute); }

  /* ===== 이모지 패널 ===== */
  .emoji-panel{
    display:none; position:fixed; z-index:120; right:20px;
    top:calc(var(--tbH,56px) + 10px);
    width:344px; max-height:62vh; overflow:hidden;
    background:#fbf5e8; border:1px solid rgba(160,125,56,.35);
    border-radius:14px; box-shadow:0 20px 50px rgba(120,100,70,.30);
    flex-direction:column;
  }
  .emoji-panel.on{ display:flex; }
  .emoji-head{ padding:12px; border-bottom:1px solid rgba(160,125,56,.2); }
  .emoji-head input{
    width:100%; font-family:var(--font); font-size:14px;
    padding:9px 12px; border-radius:9px;
    border:1px solid rgba(120,100,70,.3); background:#fff; color:var(--ivory);
  }
  .emoji-head input:focus{ outline:none; border-color:var(--gold); }
  .emoji-grid{
    padding:10px; overflow-y:auto;
    display:grid; grid-template-columns:repeat(7,1fr); gap:4px;
  }
  .emoji-cell{
    font-size:24px; line-height:1; text-align:center;
    padding:8px 0; border-radius:8px; cursor:pointer; background:transparent; border:none;
  }
  .emoji-cell:hover{ background:rgba(160,125,56,.15); }
  .emoji-empty{ grid-column:1 / -1; padding:20px; text-align:center; color:var(--mute); font-size:13px; }
  .emoji-foot{ padding:8px 12px; border-top:1px solid rgba(160,125,56,.2); font-size:11px; color:var(--mute); }

  /* ===== 색상 테마 패널 ===== */
  .theme-panel{
    display:none; position:fixed; z-index:120; right:20px;
    top:calc(var(--tbH,56px) + 10px);
    width:352px; max-height:70vh; overflow:hidden;
    background:#fbf5e8; border:1px solid rgba(160,125,56,.35);
    border-radius:14px; box-shadow:0 20px 50px rgba(120,100,70,.30);
    flex-direction:column;
  }
  .theme-panel.on{ display:flex; }
  .theme-head{ padding:12px; border-bottom:1px solid rgba(160,125,56,.2); display:flex; align-items:center; justify-content:space-between; }
  .theme-head b{ font-size:14px; color:#a07d38; }
  .theme-head span{ font-size:11px; color:#8e8170; }
  .theme-presets{ display:flex; flex-wrap:wrap; gap:6px; padding:10px 12px; border-bottom:1px solid rgba(160,125,56,.2); }
  .theme-preset{ font-family:inherit; font-size:11.5px; font-weight:700; color:#2e2823; border:1px solid rgba(120,100,70,.28); background:#f7f0e0; border-radius:999px; padding:5px 11px; cursor:pointer; transition:.12s; }
  .theme-preset:hover{ border-color:#a07d38; color:#a07d38; }
  .theme-rows{ padding:6px 12px; overflow-y:auto; }
  .theme-row{ display:flex; align-items:center; gap:10px; padding:6px 0; }
  .theme-row .tl{ flex:1 1 auto; font-size:12.5px; color:#2e2823; }
  .theme-row input[type=color]{ width:34px; height:26px; border:1px solid rgba(120,100,70,.3); border-radius:6px; background:#fff; cursor:pointer; padding:2px; }
  .theme-row input[type=text]{ width:96px; font-family:var(--font); font-size:12px; padding:5px 8px; border:1px solid rgba(120,100,70,.3); border-radius:7px; background:#fff; color:#2e2823; text-transform:uppercase; }
  .theme-row input[type=text]:focus{ outline:none; border-color:#a07d38; }
  .theme-foot{ padding:9px 12px; border-top:1px solid rgba(160,125,56,.2); display:flex; justify-content:space-between; align-items:center; }
  .theme-foot span{ font-size:11px; color:#8e8170; }

  /* ===== 토스트 ===== */
  .toast{
    position:fixed; z-index:200; left:50%; bottom:32px;
    transform:translateX(-50%) translateY(10px);
    background:var(--ivory); color:#f3ebd9; font-size:13px; font-weight:600;
    padding:10px 16px; border-radius:10px; opacity:0; pointer-events:none;
    transition:.18s ease; max-width:80vw; text-align:center;
  }
  .toast.on{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* 로딩 오버레이 */
  .overlay{
    position:fixed; inset:0; z-index:100;
    display:none; align-items:center; justify-content:center;
    background:rgba(243,235,217,.86); backdrop-filter:blur(4px);
    color:var(--ivory); font-size:16px; font-weight:600;
  }
  .overlay.on{ display:flex; }
  .overlay .box{ text-align:center; }
  .overlay .bar{ margin-top:14px; width:240px; height:6px; background:#d8c9ac; border-radius:999px; overflow:hidden; }
  .overlay .bar i{ display:block; height:100%; width:0; background:var(--gold); transition:width .2s; }

  .hint{ margin-top:18px; font-size:12.5px; color:var(--mute); text-align:center; max-width:620px; line-height:1.7; }
</style>
</head>
<body>

  <!-- ===== 컨트롤 바 ===== -->
  <div class="toolbar">
    <div class="brand-mark">삼신<span>노트</span> · 카드뉴스 에디터</div>
    <div class="spacer"></div>
    <button class="btn" id="editToggle">✏️ 편집 모드</button>
    <button class="btn" id="prev">← 이전</button>
    <div class="counter"><b id="cur">1</b> / <span id="total">7</span></div>
    <button class="btn" id="next">다음 →</button>
    <button class="btn" id="exportOne">이 카드 PNG</button>
    <button class="btn primary" id="exportAll">전체 이미지 받기</button>
    <button class="btn" id="downloadHtml">HTML 파일 받기</button>
    <button class="btn" id="emojiBtn">😊 이모지</button>
    <button class="btn" id="themeBtn">🎨 색상</button>

    <!-- 이미지 컨트롤: 모든 카드에서 사용 (현재 보고 있는 카드에 적용) -->
    <div class="cover-ctrl" id="imgCtrl">
      <span class="cc-label" id="ccLabel">이미지</span>
      <label class="btn sm2" style="cursor:pointer">이미지 불러오기<input type="file" id="ccFile" accept="image/*" hidden></label>
      <button class="btn sm2" id="ccRemove">이미지 제거</button>
      <button class="btn sm2" id="ccFit">꽉 채우기</button>
      <label class="cc">확대 <input type="range" id="ccZoom" min="0.4" max="1.8" step="0.02" value="1"></label>
      <label class="cc">세로 <input type="range" id="ccPy" min="0" max="100" value="50"></label>
      <label class="cc">오버레이 <input type="range" id="ccOverlay" min="0" max="1" step="0.05" value="0.85"></label>
    </div>
  </div>

  <!-- ===== 서식 바 (편집 모드에서 표시) ===== -->
  <div class="fmtbar" id="fmtBar">
    <span class="lab">크기·굵기</span>
    <div class="grp">
      <button class="chip" data-size="display">특대</button>
      <button class="chip" data-size="h1">제목</button>
      <button class="chip" data-size="h2">소제목</button>
      <button class="chip" data-size="lead">강조문</button>
      <button class="chip" data-size="body">본문</button>
      <button class="chip" data-size="note">작게</button>
    </div>
    <span class="sep"></span>
    <span class="lab">강조</span>
    <div class="grp">
      <button class="chip c-gold" data-color="gold">골드</button>
      <button class="chip c-iv" data-color="iv">진하게</button>
      <button class="chip c-mute" data-color="mute">흐리게</button>
    </div>
    <span class="sep"></span>
    <button class="chip warn" id="fmtClear">서식 지우기</button>
    <span class="fmt-hint">✋ 글자를 드래그해 선택한 뒤 눌러 적용 · 크기는 다시 누르면 되돌아와요</span>
  </div>

  <!-- ===== 이모지 패널 ===== -->
  <div class="emoji-panel" id="emojiPanel">
    <div class="emoji-head">
      <input id="emojiSearch" type="text" placeholder="이모지 검색 (예: 하트, 배란, 체크, 별)">
    </div>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div class="emoji-foot">편집 모드에서 원하는 위치를 클릭한 뒤 이모지를 누르면 삽입돼요.</div>
  </div>

  <!-- ===== 색상 테마 패널 ===== -->
  <div class="theme-panel" id="themePanel">
    <div class="theme-head"><b>🎨 색상 테마</b><span>팔레트 · HEX 직접 입력</span></div>

/* =========================================================

/* --- 토스트 --- */
const toastEl = document.getElementById('toast');
let toastTimer = null;
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('on');

  toastTimer = setTimeout(()=>toastEl.classList.remove('on'), 1800);

/* --- 서식 바 위치를 툴바 높이에 맞춤 --- */
const toolbarEl = document.querySelector('.toolbar');

/* --- 편집 영역 안의 선택(커서 위치) 기억 --- */
let savedRange = null, savedHost = null;
function editableHost(node){
  while(node && node !== document){
    if(node.nodeType === 1 && node.hasAttribute && node.hasAttribute('data-edit')) return node;
    node = node.parentNode;
  }
  return null;
}
document.addEventListener('selectionchange', ()=>{
  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const r = sel.getRangeAt(0);
  const host = editableHost(r.startContainer);
  if(host){ savedRange = r.cloneRange(); savedHost = host; }
});
function useSaved(){
  if(!savedRange) return null;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(savedRange);
  return sel;
}

/* =========================================================
   서식 적용 — 덮어쓰기(clean replace) 방식
   · 크기(size) : font-size·굵기만 인라인 적용(색·줄간격은 문단에 맡김)
   · 강조(color): 색/굵기 클래스만 인라인 적용
   같은 종류를 다시 적용하면 이전 서식을 먼저 벗겨내므로,
   크기를 되돌리면 문단의 원래 줄간격으로 복귀합니다.
   ========================================================= */
// 시스템 프리셋 값 (템플릿 타이포와 동일: [font-size px, font-weight])
const SIZE_MAP = { display:[140,800], h1:[84,800], h2:[58,700], lead:[50,600], body:[44,400], note:[34,400] };

// 선택이 속한 '줄(문단) 블록' 찾기 — 호스트 아래 가장 바깥쪽 DIV
function nearestLineBlock(node, host){
  let el = node.nodeType === 3 ? node.parentNode : node;
  let last = null;
  while(el && el !== host){
    if(el.tagName === 'DIV') last = el;
    el = el.parentNode;
  }
  return last || host;
}

// 호스트 시작부터 (container,offset)까지의 글자수
function charOffset(host, container, offset){
  const r = document.createRange();
  r.setStart(host, 0);
  r.setEnd(container, offset);
  return r.toString().length;
}
// 글자수 위치로 Range 복원(텍스트 노드 기준)
function rangeFromOffsets(host, start, end){
  const w = document.createTreeWalker(host, NodeFilter.SHOW_TEXT);
  let pos = 0, n, sN = null, sO = 0, eN = null, eO = 0;
  while((n = w.nextNode())){
    const len = n.nodeValue.length;
    if(sN === null && start <= pos + len){ sN = n; sO = Math.max(0, start - pos); }
    if(end <= pos + len){ eN = n; eO = Math.max(0, end - pos); break; }
    pos += len;
  }
  if(!sN){ sN = host; sO = host.childNodes.length; }
  if(!eN){ eN = host; eO = host.childNodes.length; }
  const r = document.createRange();
  r.setStart(sN, sO); r.setEnd(eN, eO);
  return r;
}
function unwrapSpan(sp){
  const p = sp.parentNode; if(!p) return;
  while(sp.firstChild) p.insertBefore(sp.firstChild, sp);
  p.removeChild(sp);
}

// 공통: 선택과 겹치는 기존 서식 span(감싸는 것 포함)을 모두 벗긴 뒤 다시 적용
function fmtSelection(makeFn, stripTypes){
  if(!editing){ toast('편집 모드를 먼저 켜세요'); return; }
  const sel = useSaved();
  if(!sel || !sel.rangeCount){ toast('글자를 드래그해 선택하세요'); return; }
  const range = sel.getRangeAt(0);
  if(range.collapsed){ toast('수정할 글자를 먼저 선택하세요'); return; }
  const host = editableHost(range.startContainer);
  if(!host){ toast('편집 가능한 글자를 선택하세요'); return; }
  if(nearestLineBlock(range.startContainer, host) !== nearestLineBlock(range.endContainer, host)){
    toast('한 문단(줄) 안에서 선택해 주세요'); return;
  }

  // 1) 선택 위치를 '글자수'로 기억 (span을 벗겨도 글자수는 안 변하므로 안전)
  const start = charOffset(host, range.startContainer, range.startOffset);
  const end   = charOffset(host, range.endContainer,   range.endOffset);
  if(start >= end){ toast('수정할 글자를 먼저 선택하세요'); return; }

  // 2) 선택과 겹치는 같은 종류의 서식 span을 모두 벗김 (바깥에서 감싸는 것도 포함)
  const targets = [...host.querySelectorAll('span[data-fmt]')].filter(sp =>
    stripTypes.includes(sp.dataset.fmt) && range.intersectsNode(sp));
  targets.forEach(unwrapSpan);
  host.normalize();

  // 3) 같은 글자 범위를 다시 잡아 새 서식으로 감싸기
  const r = rangeFromOffsets(host, start, end);
  if(makeFn){
    const span = makeFn();
    try{ r.surroundContents(span); }
    catch(_){ const f = r.extractContents(); span.appendChild(f); r.insertNode(span); }
    const rr = document.createRange(); rr.selectNodeContents(span);
    sel.removeAllRanges(); sel.addRange(rr); savedRange = rr.cloneRange();
  } else {
    sel.removeAllRanges(); sel.addRange(r); savedRange = r.cloneRange();
  }
  savedHost = host;
  writeBack(host);
}

// 크기·굵기 적용 (색·줄간격은 문단에 맡김 → 되돌리면 원래 간격으로 복귀)
function applySize(name){
  const v = SIZE_MAP[name]; if(!v) return;
  fmtSelection(()=>{
    const s = document.createElement('span');
    s.dataset.fmt = 'size';
    s.dataset.size = name;
    s.style.fontSize = v[0] + 'px';
    s.style.fontWeight = v[1];
    return s;
  }, ['size']);
}

  fmtSelection(()=>{

    s.dataset.fmt = 'color';
    s.className = cls;                    // gold / iv / mute (색·굵기만, 크기·줄간격 없음)

  }, ['color']);
}

function renderEmojis(q){

  const list = q ? EMOJIS.filter(e => e.k.toLowerCase().includes(q) || e.c === q) : EMOJIS;
  if(list.length === 0){
    emojiGrid.innerHTML = '<div class="emoji-empty">검색 결과가 없어요</div>';

  }
  emojiGrid.innerHTML = list.map(e =>
    `<button class="emoji-cell" data-e="${e.c}" title="${e.k.split(' ')[0]}">${e.c}</button>`
  ).join('');
}

emojiGrid.addEventListener('click', e=>{
  const cell = e.target.closest('.emoji-cell');
  if(cell) insertEmoji(cell.dataset.e);
});

function insertEmoji(ch){
  if(!editing){ toast('편집 모드를 켜고 위치를 클릭하세요'); return; }
  if(!savedRange || !savedHost){ toast('삽입할 위치를 카드에서 먼저 클릭하세요'); return; }
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(savedRange);
  const range = sel.getRangeAt(0);
  range.deleteContents();
  const node = document.createTextNode(ch);
  range.insertNode(node);
  range.setStartAfter(node); range.setEndAfter(node); range.collapse(true);
  sel.removeAllRanges(); sel.addRange(range);
  savedRange = range.cloneRange();
  writeBack(savedHost);
}

function normHex(s){
  s = (s || '').trim();
  if(s && s[0] !== '#') s = '#' + s;
  return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : null;
}
function currentColor(v){
  const def = (THEME_VARS.find(t=>t.v===v)||{}).def || '#000000';
  return APP_DATA.theme[v] || def;
}
function setThemeVar(v, val){
  const hx = normHex(val);
  if(!hx) return false;
  document.documentElement.style.setProperty(v, hx);
  APP_DATA.theme[v] = hx;
  return true;
}
// 저장돼 있던 테마 즉시 적용
Object.entries(APP_DATA.theme).forEach(([v,val])=>{
  if(normHex(val)) document.documentElement.style.setProperty(v, val);
});

function buildThemeUI(){
  themePresets.innerHTML = THEME_PRESETS.map((p,i)=>
    `<button class="theme-preset" data-preset="${i}">${p.name}</button>`).join('');
  themeRows.innerHTML = THEME_VARS.map(t=>{
    const val = currentColor(t.v);
    return `<div class="theme-row" data-var="${t.v}">
      <span class="tl">${t.label}</span>
      <input type="color" value="${val}">
      <input type="text" maxlength="7" value="${val.toUpperCase()}">
    </div>`;
  }).join('');
}
function refreshThemeUI(){
  themeRows.querySelectorAll('.theme-row').forEach(row=>{
    const v = row.dataset.var, val = currentColor(v);
    row.querySelector('input[type=color]').value = val;
    row.querySelector('input[type=text]').value = val.toUpperCase();
  });
}

  const row = e.target.closest('.theme-row'); if(!row) return;
  const v = row.dataset.var;
  if(e.target.type === 'color'){
    if(setThemeVar(v, e.target.value))
      row.querySelector('input[type=text]').value = e.target.value.toUpperCase();
  } else {
    const hx = normHex(e.target.value);
    if(hx){ setThemeVar(v, hx); row.querySelector('input[type=color]').value = hx; }
  }
});

  toast(p.name + ' 적용');

/* ===== 카드별 이미지 적용 (비율 유지) ===== */
function applyCardImg(i){
  const card = cards[i];
  const bg = card.querySelector('.cover-bg');
  const ov = card.querySelector('.cover-overlay');
  const im = APP_DATA.images[i];
  if(!bg) return;

  if(im.src){
    bg.style.backgroundImage = `url("${im.src}")`;
    const cw = 1080, ch = 1350;                        // 카드 실제 픽셀 비율(4:5)
    const natW = im._natW || cw, natH = im._natH || ch;
    const ir = natW / natH, cr = cw / ch;              // 이미지·컨테이너 종횡비
    let bw, bh;                                        // 비율 유지한 배경 크기
    if(im.fit === 'cover'){                            // 꽉 채우기(크롭)
      if(ir > cr){ bh = ch; bw = ch * ir; } else { bw = cw; bh = cw / ir; }
    } else {                                           // 전체 보기(레터박스)
      if(ir > cr){ bw = cw; bh = cw / ir; } else { bh = ch; bw = ch * ir; }
    }
    bw *= im.zoom; bh *= im.zoom;                      // 확대 배율(비율 유지)
    bg.style.backgroundSize = `${bw}px ${bh}px`;
    bg.style.backgroundPosition = `${im.px}% ${im.py}%`;
    ov.style.opacity = im.overlay;                     // 오버레이 투명도
    card.classList.add('has-img');
  } else {
    bg.style.backgroundImage = 'none';
    ov.style.opacity = 0;                              // 이미지 없으면 오버레이도 숨김
    card.classList.remove('has-img');
  }
}
// 이미지 원본 크기를 읽어온 뒤 적용(왜곡 방지의 핵심)
function loadNat(i){
  const im = APP_DATA.images[i];
  if(!im.src){ applyCardImg(i); return; }
  const img = new Image();
  img.onload = ()=>{ im._natW = img.naturalWidth; im._natH = img.naturalHeight; applyCardImg(i); };
  img.onerror = ()=>{ applyCardImg(i); };
  img.src = im.src;
}
// 초기: 저장돼 있던 이미지(base64 등) 모두 로드
for(let i=0;i<TOTAL;i++){ loadNat(i); }

/* ===== 이미지 컨트롤 (현재 카드에 적용) ===== */
const ccLabel   = document.getElementById('ccLabel');
const ccFile    = document.getElementById('ccFile');
const ccRemove  = document.getElementById('ccRemove');
const ccFit     = document.getElementById('ccFit');
const ccZoom    = document.getElementById('ccZoom');
const ccPy      = document.getElementById('ccPy');
const ccOverlay = document.getElementById('ccOverlay');

function refreshImgCtrl(){
  const im = APP_DATA.images[idx];
  ccLabel.textContent = (idx===0 ? '표지 이미지' : `이미지 · ${idx+1} / ${TOTAL}`);
  ccZoom.value    = im.zoom;
  ccPy.value      = im.py;
  ccOverlay.value = im.overlay;
  ccFit.textContent = im.fit === 'cover' ? '꽉 채우기' : '전체 보기';
  ccRemove.disabled = !im.src;
}

ccFile.addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = ()=>{
    const im = APP_DATA.images[idx];
    im.src = rd.result; im.fit='cover'; im.zoom=1; im.px=50; im.py=50;
    im._natW = 0; im._natH = 0;
    loadNat(idx);
    refreshImgCtrl();
  };
  rd.readAsDataURL(f);
  e.target.value = '';                    // 같은 파일 다시 선택 가능하도록
});
ccRemove.addEventListener('click', ()=>{
  const im = APP_DATA.images[idx];
  im.src=''; im._natW=0; im._natH=0;
  applyCardImg(idx); refreshImgCtrl();
});
ccFit.addEventListener('click', ()=>{
  const im = APP_DATA.images[idx];
  im.fit = im.fit==='cover' ? 'contain' : 'cover';
  applyCardImg(idx); refreshImgCtrl();
});
ccZoom.addEventListener('input', e=>{ APP_DATA.images[idx].zoom = parseFloat(e.target.value); applyCardImg(idx); });
ccPy.addEventListener('input', e=>{ APP_DATA.images[idx].py = parseFloat(e.target.value); applyCardImg(idx); });
ccOverlay.addEventListener('input', e=>{ APP_DATA.images[idx].overlay = parseFloat(e.target.value); applyCardImg(idx); });

prevBtn.onclick = ()=>show(idx-1);
nextBtn.onclick = ()=>show(idx+1);
window.addEventListener('keydown', e=>{
  if(editing) return;                     // 편집 중엔 방향키로 커서 이동 방해 안 하게
  if(e.key==='ArrowLeft') show(idx-1);
  if(e.key==='ArrowRight') show(idx+1);
});
show(0);

/* ===== 미리보기 스케일(화면 폭에 맞춤) ===== */
const viewport = document.getElementById('viewport');
const CARD_W = 1080, CARD_H = 1350;
function fit(){
  const maxW = Math.min(window.innerWidth - 32, 520); // 미리보기 최대 폭
  const scale = maxW / CARD_W;
  deck.style.transform = `scale(${scale})`;
  viewport.style.width  = (CARD_W*scale) + 'px';
  viewport.style.height = (CARD_H*scale) + 'px';
}
window.addEventListener('resize', fit);
fit();

/* ===== PNG 캡처 ===== */
const overlay = document.getElementById('overlay');
const ovText = document.getElementById('ovText');
const ovBar = document.getElementById('ovBar');
const OUT_SCALE = 2; // 1080x1350 의 2배 = 2160x2700 고해상도

async function captureCard(i){
  const card = cards[i];
  const wasActive = card.classList.contains('active');
  const prevTransform = deck.style.transform;
  const prevW = viewport.style.width, prevH = viewport.style.height;
  const wasEditing = document.body.classList.contains('editing');

  document.body.classList.remove('editing');        // 편집 점선이 캡처되지 않도록
  cards.forEach(c=>c.classList.remove('active'));
  card.classList.add('active');
  deck.style.transform = 'none';
  viewport.style.width = CARD_W+'px';
  viewport.style.height = CARD_H+'px';

  await document.fonts.ready;                        // 폰트 로딩 완료 대기
  await new Promise(r=>requestAnimationFrame(r));

  const canvas = await html2canvas(card, {
    width: CARD_W, height: CARD_H,
    windowWidth: CARD_W, windowHeight: CARD_H,
    scale: OUT_SCALE,
    backgroundColor: null,
    useCORS: true,
    logging: false,
  });

  // 원상복구
  deck.style.transform = prevTransform;
  viewport.style.width = prevW; viewport.style.height = prevH;
  cards.forEach(c=>c.classList.remove('active'));
  if(wasActive) card.classList.add('active'); else cards[idx].classList.add('active');
  if(wasEditing) document.body.classList.add('editing');

  return canvas;
}

function canvasToBlob(canvas){
  return new Promise(res => canvas.toBlob(res, 'image/png'));
}

// 단일 카드 다운로드
document.getElementById('exportOne').onclick = async ()=>{
  overlay.classList.add('on'); ovText.textContent='이미지 생성 중…'; ovBar.style.width='40%';
  try{
    const canvas = await captureCard(idx);
    ovBar.style.width='90%';
    const blob = await canvasToBlob(canvas);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `samsinnote_card_${String(idx+1).padStart(2,'0')}.png`;
    a.click();
    URL.revokeObjectURL(a.href);
    ovBar.style.width='100%';
  }catch(err){ alert('내보내기 실패: '+err.message); }
  finally{ setTimeout(()=>{overlay.classList.remove('on'); ovBar.style.width='0';},300); show(idx); }
};

// 전체 이미지 순차 다운로드
document.getElementById('exportAll').onclick = async ()=>{
  overlay.classList.add('on');
  try{
    for(let i=0;i<TOTAL;i++){
      ovText.textContent = `이미지 저장 중… (${i+1}/${TOTAL})`;
      ovBar.style.width = `${Math.round(((i+1)/TOTAL)*100)}%`;
      const canvas = await captureCard(i);
      const blob = await canvasToBlob(canvas);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `samsinnote_card_${String(i+1).padStart(2,'0')}.png`;
      a.click();
      await new Promise(r=>setTimeout(r, 500));  // 브라우저 다중 다운로드 간격
      URL.revokeObjectURL(a.href);
    }
  }catch(err){ alert('내보내기 실패: '+err.message); }
  finally{ setTimeout(()=>{overlay.classList.remove('on'); ovBar.style.width='0';},300); show(idx); }
};

/* ===== HTML 파일로 받기 (편집·이미지 상태를 그대로 저장) ===== */
document.getElementById('downloadHtml').onclick = function(){
  // 편집 내용은 input 이벤트로 이미 APP_DATA에 반영됨. 내부 캐시(_natW 등)만 제거.
  const clean = JSON.parse(JSON.stringify(APP_DATA, (k,v)=> (k==='_natW'||k==='_natH') ? undefined : v));
  const dataJs = '/*__DATA_START__*/\nconst APP_DATA = ' + JSON.stringify(clean) + ';\n/*__DATA_END__*/';
  const out = ORIGINAL_HTML.replace(/\/\*__DATA_START__\*\/[\s\S]*?\/\*__DATA_END__\*\//, function(){ return dataJs; });
  const blob = new Blob([out], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'samsinnote_cardnews.html';
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
};
</script>
